name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check orchestrator/
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check orchestrator/

  check-dashboards:
    name: Grafana Dashboards In Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The Grafana JSON under provisioning/dashboards/json/ is GENERATED from the
      # Python builders in monitoring/grafana/dashgen/. Regenerate and fail if the
      # committed JSON differs — that means someone hand-edited the JSON (or a
      # Grafana-UI edit got snapshotted back into the repo) instead of editing the
      # builder. build.py uses only the stdlib, so there are no deps to install.
      - name: Regenerate dashboards from the dashgen builders
        run: python monitoring/grafana/dashgen/build.py
      - name: Fail if the committed JSON drifted from the builders
        run: |
          if git diff --exit-code -- monitoring/grafana/provisioning/dashboards/json/; then
            echo "Dashboards are in sync with monitoring/grafana/dashgen/."
          else
            echo "::error::Grafana dashboard JSON is out of sync with its dashgen builder (diff above)."
            echo "These JSON files are GENERATED — do not hand-edit them, and do not rely on Grafana-UI"
            echo "edits persisting. Edit the builder in monitoring/grafana/dashgen/dashboards/ instead."
            echo "Fix: cd monitoring/grafana/dashgen && python3 build.py, then commit the regenerated JSON."
            exit 1
          fi

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r orchestrator/requirements.txt
          pip install pytest pytest-asyncio respx
      - name: Run tests
        run: python -m pytest orchestrator/tests/ -v

  lint-frontend:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npx eslint src/
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  docker-build:
    name: Docker Build (orchestrator)
    runs-on: ubuntu-latest
    needs: [lint-python, test-python]
    steps:
      - uses: actions/checkout@v4
      - name: Build orchestrator image
        run: docker build -t brain-orchestrator:test orchestrator/

  deploy:
    name: Deploy to Jupiter
    # Self-hosted runner on Jupiter (the always-on box). Registered as
    # `actions.runner.mexirab-brain_gateway.jupiter.service` in systemd on Jupiter,
    # polls GitHub Actions for jobs, executes them locally as labadmin.
    # Jupiter is always on (unlike Helios, which is powered off most of the time
    # post power-tiering) so auto-deploy is reliable. The orchestrator + frontend
    # now run on Jupiter; Helios is model-layer only.
    runs-on: [self-hosted, linux, jupiter]
    needs: [lint-python, test-python, lint-frontend, docker-build, check-dashboards]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Serialize deploys. The runner deploys from ONE shared checkout at
    # /home/labadmin/gateway_nerves; rapid successive merges must not race on it
    # (two concurrent `git pull`s advancing the checkout past each other made the
    # old rebuild decision see an empty diff and silently skip). cancel-in-progress
    # is false so every merge's deploy is queued and processed, never dropped.
    concurrency:
      group: deploy-jupiter
      cancel-in-progress: false
    # The runner runs on Jupiter with docker access, so we don't need a checkout
    # step — we operate directly on the live checkout at /home/labadmin/gateway_nerves.
    steps:
      - name: Pull + rebuild changed services
        run: |
          set -euo pipefail
          cd /home/labadmin/gateway_nerves

          # Decide what to rebuild by diffing against the LAST-DEPLOYED commit
          # (recorded in .last-deployed-sha), NOT against this job's own pull.
          # The checkout is shared and can be advanced out-of-band (a concurrent
          # deploy, or a manual `git pull` during ops), so a no-op pull does NOT
          # mean nothing changed relative to what's actually running. The marker
          # is the source of truth for "what's currently deployed."
          MARKER=.last-deployed-sha
          LAST="$(cat "$MARKER" 2>/dev/null || true)"

          if ! git pull --ff-only; then
            echo "::error::git pull --ff-only failed — the deploy checkout at /home/labadmin/gateway_nerves is dirty or diverged. Run: cd /home/labadmin/gateway_nerves && git status"
            git status --short || true
            exit 1
          fi
          HEAD_SHA="$(git rev-parse HEAD)"

          # First run (no/invalid marker): fall back to the parent so we still
          # rebuild whatever this push changed.
          if [ -z "$LAST" ] || ! git cat-file -e "${LAST}^{commit}" 2>/dev/null; then
            LAST="$(git rev-parse HEAD~1)"
          fi

          if [ "$LAST" = "$HEAD_SHA" ]; then
            echo "Already deployed $HEAD_SHA — nothing to do."
            exit 0
          fi

          echo "Rebuilding for changes ${LAST}..${HEAD_SHA}:"
          CHANGED="$(git diff --name-only "$LAST" "$HEAD_SHA")"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE "^orchestrator/|^docker-compose\.yml$"; then
            echo "::group::Rebuilding orchestrator"
            docker compose up -d --build --force-recreate orchestrator
            echo "::endgroup::"
          fi

          if echo "$CHANGED" | grep -qE "^frontend/|^docker-compose\.yml$"; then
            echo "::group::Rebuilding frontend"
            docker compose up -d --build --force-recreate frontend
            echo "::endgroup::"
          fi

          # Record what we just deployed so the next run diffs from here.
          echo "$HEAD_SHA" > "$MARKER"
          echo "Deploy complete at $(date -Iseconds)"

      - name: Health check
        run: |
          set -eu
          sleep 5
          curl -sSf http://localhost:8888/health > /dev/null && echo "orchestrator healthy"
          curl -sSf -o /dev/null http://localhost:3001 && echo "frontend reachable"
