name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check orchestrator/
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check orchestrator/

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r orchestrator/requirements.txt
          pip install pytest pytest-asyncio
      - name: Run tests
        working-directory: orchestrator
        run: python -m pytest tests/ -v

  lint-frontend:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npx eslint src/
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  docker-build:
    name: Docker Build (orchestrator)
    runs-on: ubuntu-latest
    needs: [lint-python, test-python]
    steps:
      - uses: actions/checkout@v4
      - name: Build orchestrator image
        run: docker build -t brain-orchestrator:test orchestrator/

  deploy:
    name: Deploy to Helios
    runs-on: ubuntu-latest
    needs: [lint-python, test-python, lint-frontend, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HELIOS_SSH_HOST }}
          username: labadmin
          key: ${{ secrets.HELIOS_SSH_KEY }}
          script: |
            cd /opt/helios/gateway_mvp
            git pull --ff-only

            CHANGED=$(git diff --name-only HEAD~1 HEAD)

            if echo "$CHANGED" | grep -q "^orchestrator/"; then
              echo "Rebuilding orchestrator..."
              docker compose up -d --build orchestrator
            fi

            if echo "$CHANGED" | grep -q "^frontend/"; then
              echo "Rebuilding frontend..."
              docker compose up -d --build --force-recreate frontend
            fi

            echo "Deploy complete at $(date)"
