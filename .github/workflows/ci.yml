name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check orchestrator/
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check orchestrator/

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r orchestrator/requirements.txt
          pip install pytest pytest-asyncio respx
      - name: Run tests
        run: python -m pytest orchestrator/tests/ -v

  lint-frontend:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npx eslint src/
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  docker-build:
    name: Docker Build (orchestrator)
    runs-on: ubuntu-latest
    needs: [lint-python, test-python]
    steps:
      - uses: actions/checkout@v4
      - name: Build orchestrator image
        run: docker build -t brain-orchestrator:test orchestrator/

  deploy:
    name: Deploy to Jupiter
    # Self-hosted runner on Jupiter (the always-on box). Registered as
    # `actions.runner.mexirab-brain_gateway.jupiter.service` in systemd on Jupiter,
    # polls GitHub Actions for jobs, executes them locally as labadmin.
    # Jupiter is always on (unlike Helios, which is powered off most of the time
    # post power-tiering) so auto-deploy is reliable. The orchestrator + frontend
    # now run on Jupiter; Helios is model-layer only.
    runs-on: [self-hosted, linux, jupiter]
    needs: [lint-python, test-python, lint-frontend, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # The runner runs on Jupiter with docker access, so we don't need a checkout
    # step — we operate directly on the live checkout at /home/labadmin/gateway_nerves.
    steps:
      - name: Pull latest main
        run: |
          cd /home/labadmin/gateway_nerves
          BEFORE=$(git rev-parse HEAD)
          git pull --ff-only
          AFTER=$(git rev-parse HEAD)
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER" >> "$GITHUB_OUTPUT"
        id: pull

      - name: Rebuild changed services
        run: |
          cd /home/labadmin/gateway_nerves
          BEFORE="${{ steps.pull.outputs.before }}"
          AFTER="${{ steps.pull.outputs.after }}"

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No new commits, nothing to rebuild."
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE "^orchestrator/|^docker-compose\.yml$"; then
            echo "::group::Rebuilding orchestrator"
            docker compose up -d --build --force-recreate orchestrator
            echo "::endgroup::"
          fi

          if echo "$CHANGED" | grep -qE "^frontend/|^docker-compose\.yml$"; then
            echo "::group::Rebuilding frontend"
            docker compose up -d --build --force-recreate frontend
            echo "::endgroup::"
          fi

          echo "Deploy complete at $(date -Iseconds)"

      - name: Health check
        run: |
          sleep 5
          curl -sSf http://localhost:8888/health > /dev/null && echo "orchestrator healthy"
          curl -sSf -o /dev/null http://localhost:3001 && echo "frontend reachable"
