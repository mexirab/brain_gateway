# Brain Gateway Docker Compose
# ============================
# Environment variables loaded from .env file (create from .env.example)
#
# Usage:
#   cp .env.example .env
#   # Edit .env with your values
#   docker compose up -d

# Shared logging config to reduce disk I/O
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SERVICE_WEBUI_PORT:-80}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_AUTH=False
      - WEBUI_NAME=${WEBUI_NAME:-Brain Gateway}
      # Point to orchestrator instead of litellm directly
      - OPENAI_API_BASE_URL=http://orchestrator:${SERVICE_ORCHESTRATOR_PORT:-8888}/v1
      - OPENAI_API_KEY=${API_TOKEN:?API_TOKEN must be set in .env}
      - REDIS_URL=redis://redis:6379/0
      # TTS configuration - Qwen3-TTS on Uranus
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://${NODE_URANUS_IP:-10.0.0.173}:${SERVICE_TTS_PORT:-8002}/v1
      - AUDIO_TTS_OPENAI_API_KEY=local
      - AUDIO_TTS_VOICE=${TTS_VOICE:-jessica}
      - AUDIO_TTS_SPLIT_ON=paragraph
      # STT configuration - Whisper on Uranus
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=http://${NODE_URANUS_IP:-10.0.0.173}:${SERVICE_STT_PORT:-8003}/v1
      - AUDIO_STT_OPENAI_API_KEY=local
      - AUDIO_STT_MODEL=whisper-1
    depends_on:
      - orchestrator
      - redis
    networks:
      - gateway-net

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: brain-orchestrator
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SERVICE_ORCHESTRATOR_PORT:-8888}:8888"
    volumes:
      # Mount ChromaDB data
      - ${USER_HOME:-/home/labadmin}/.local/share/chroma:/chroma:rw
      # Mount env file
      - ${USER_HOME:-/home/labadmin}/brain_gateway/.env:/app/.env:ro
      # Mount RAG data for write access (medications, projects)
      - ${RAG_BASE:-/home/labadmin/rag/nadim_rag}:/rag:rw
      # Mount SSH keys for Helios auto-start
      - ${USER_HOME:-/home/labadmin}/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - ${USER_HOME:-/home/labadmin}/.ssh/known_hosts:/root/.ssh/known_hosts:ro
      # Mount Google OAuth2 credentials (rw needed for token refresh)
      - ${GATEWAY_ROOT_PATH:-/opt/jupiter/gateway_mvp}/credentials:/app/credentials:rw
      # Persistent storage for reminder audio files
      - brain-audio:/tmp/brain_audio:rw
      # Finance SQLite database
      - finance-data:/app/data:rw
      # User profile (personal config — names, speakers, sensors, etc.)
      - ${GATEWAY_ROOT_PATH:-/opt/jupiter/gateway_mvp}/user_profile.yaml:/app/user_profile.yaml:ro
    environment:
      # Primary model (conversation + tools)
      - MODEL_URL=http://${NODE_HELIOS_IP:-10.0.0.195}:${SERVICE_MODEL_PORT:-8080}/v1
      - MODEL_NAME=${MODEL_NAME:-Qwen3.5-27B}
      # Fallback model (used when primary is unavailable)
      - FALLBACK_MODEL_URL=http://${NODE_SATURN_IP:-10.0.0.58}:8001/v1
      - FALLBACK_MODEL_NAME=${FALLBACK_MODEL_NAME:-Qwen3.5-9B}
      # Embedding model
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v2-moe}
      # Home Assistant
      - HA_URL=http://${NODE_HA_IP:-10.0.0.106}:8123
      - HA_TOKEN=${HA_TOKEN:?HA_TOKEN must be set in .env}
      # ChromaDB / RAG
      - CHROMA_PERSIST=/chroma/personal_rag
      - CHROMA_COLLECTION=${CHROMA_COLLECTION:-nadim_rag}
      - MIN_COS=${MIN_COS:-0.20}
      - TOP_K=${TOP_K:-25}
      - RAG_BASE=/rag
      # TTS
      - TTS_URL=http://${NODE_URANUS_IP:-10.0.0.173}:${SERVICE_TTS_PORT:-8002}
      - TTS_VOICE=${TTS_VOICE:-jessica}
      # Callback URL
      - ORCHESTRATOR_URL=http://${NODE_JUPITER_IP:-10.0.0.248}:${SERVICE_ORCHESTRATOR_PORT:-8888}
      # SSH for remote model server management
      - NODE_HELIOS_IP=${NODE_HELIOS_IP:-10.0.0.195}
      - MODEL_SSH_USER=${MODEL_SSH_USER:-labadmin}
      # Reminders
      - REMINDER_SPEAKER=${REMINDER_SPEAKER:-media_player.all_speakers}
      - TZ=${TZ:-America/Chicago}
      # Agentic settings
      - MAX_TOOL_ROUNDS=${MAX_TOOL_ROUNDS:-5}
      # Pi-hole focus blocking (comma-separated for multi-instance)
      - PIHOLE_URLS=${PIHOLE_URLS:-http://10.0.0.248:${PIHOLE_WEB_PORT:-8053},http://10.0.0.58:${PIHOLE_WEB_PORT:-8053}}
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD:-}
      - PIHOLE_FOCUS_GROUP=${PIHOLE_FOCUS_GROUP:-focus_blocklist}
      - FOCUS_BLOCKING_ENABLED=${FOCUS_BLOCKING_ENABLED:-true}
      # Focus audio
      - FOCUS_AUDIO_PLAYER=${FOCUS_AUDIO_PLAYER:-media_player.office_speaker}
      # SearXNG web search
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - SEARXNG_MAX_RESULTS=${SEARXNG_MAX_RESULTS:-5}
      # Google Calendar
      - GOOGLE_CREDENTIALS_PATH=${GOOGLE_CREDENTIALS_PATH:-/app/credentials/google_credentials.json}
      - GOOGLE_TOKEN_PATH=${GOOGLE_TOKEN_PATH:-/app/credentials/google_token.json}
      - CALENDAR_POLL_INTERVAL=${CALENDAR_POLL_INTERVAL:-15}
      - MORNING_BRIEFING_TIME=${MORNING_BRIEFING_TIME:-07:00}
      - MORNING_BRIEFING_ENABLED=${MORNING_BRIEFING_ENABLED:-true}
      - MORNING_BRIEFING_SPEAKER=${MORNING_BRIEFING_SPEAKER:-media_player.bedroom_pair}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - TRAVEL_TIME_BUFFER=${TRAVEL_TIME_BUFFER:-10}
      # Finance
      - FINANCE_DB_PATH=/app/data/finance.db
      # YNAB integration
      - YNAB_ACCESS_TOKEN=${YNAB_ACCESS_TOKEN:-}
      - YNAB_BUDGET_ID=${YNAB_BUDGET_ID:-}
      - YNAB_SYNC_INTERVAL=${YNAB_SYNC_INTERVAL:-30}
      - YNAB_FUN_MONEY_CATEGORY=${YNAB_FUN_MONEY_CATEGORY:-Fun Money}
      # API authentication
      - API_TOKEN=${API_TOKEN:?API_TOKEN must be set in .env}
      # Auto-learn from conversations
      - AUTO_LEARN_ENABLED=${AUTO_LEARN_ENABLED:-true}
      - AUTO_LEARN_DELAY_MINUTES=${AUTO_LEARN_DELAY_MINUTES:-10}
      - AUTO_LEARN_MAX_FACTS=${AUTO_LEARN_MAX_FACTS:-5}
      - AUTO_LEARN_DEDUP_THRESHOLD=${AUTO_LEARN_DEDUP_THRESHOLD:-0.85}
      - AUTO_LEARN_MARKDOWN=${AUTO_LEARN_MARKDOWN:-true}
      - AUTO_LEARN_ENCRYPT=${AUTO_LEARN_ENCRYPT:-true}
      - AUTO_LEARN_ENCRYPTION_KEY=${AUTO_LEARN_ENCRYPTION_KEY:-}
      # CORS for frontend
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3001,http://10.0.0.248:3001,https://convivialprophet.com}
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SERVICE_LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      # Derived URLs for litellm-config.yaml os.environ/ references
      - MODEL_API_BASE=http://${NODE_HELIOS_IP:-10.0.0.195}:${SERVICE_MODEL_PORT:-8080}/v1
      - FALLBACK_API_BASE=http://${NODE_SATURN_IP:-10.0.0.58}:8001/v1
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set in .env}
    command: --config /app/config.yaml --port 4000
    networks:
      - gateway-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - gateway-net

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    logging: *default-logging

    network_mode: "host"

    environment:
      - TZ=${TZ:-America/Chicago}
      - FTLCONF_webserver_api_password=${PIHOLE_PASSWORD:-}
      - FTLCONF_dns_listeningMode=all
      # keep your UI on 8053
      - FTLCONF_webserver_port=${PIHOLE_WEB_PORT:-8053}

    volumes:
      - pihole-etc:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d

    cap_add:
      - NET_ADMIN
      - NET_RAW
  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    container_name: nebula-sync
    restart: unless-stopped
    logging: *default-logging
    environment:
      - PRIMARY=http://10.0.0.248:${PIHOLE_WEB_PORT:-8053}|${PIHOLE_PASSWORD}
      - REPLICAS=http://10.0.0.58:${PIHOLE_WEB_PORT:-8053}|${PIHOLE_PASSWORD}
      - FULL_SYNC=true
      - RUN_GRAVITY=true
      - CRON=*/15 * * * *
      - TZ=${TZ:-America/Chicago}
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SEARXNG_PORT:-8090}:8080"
    volumes:
      - searxng-data:/etc/searxng
      - ${GATEWAY_ROOT_PATH:-/opt/jupiter/gateway_mvp}/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8090}/
    networks:
      - gateway-net

  wyoming-whisper:
    build:
      context: ./tts
      dockerfile: Dockerfile.wyoming-whisper
    container_name: wyoming-whisper
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${WYOMING_WHISPER_PORT:-10300}:10300"
    environment:
      - TZ=${TZ:-America/Chicago}
    command: >-
      --uri tcp://0.0.0.0:10300
      --stt-url http://${NODE_URANUS_IP:-10.0.0.173}:${SERVICE_STT_PORT:-8003}
      --language en
    networks:
      - gateway-net

  wyoming-jessica-tts:
    build:
      context: ./tts
      dockerfile: Dockerfile.wyoming-jessica
    container_name: wyoming-jessica-tts
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${WYOMING_JESSICA_PORT:-10301}:10301"
    environment:
      - TZ=${TZ:-America/Chicago}
    command: >-
      --uri tcp://0.0.0.0:10301
      --tts-url http://${NODE_URANUS_IP:-10.0.0.173}:${SERVICE_TTS_PORT:-8002}
      --voice ${TTS_VOICE:-jessica}
    networks:
      - gateway-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brain-frontend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SERVICE_FRONTEND_PORT:-3001}:3001"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:${SERVICE_ORCHESTRATOR_PORT:-8888}
      - NEXT_PUBLIC_ORCHESTRATOR_URL=http://${NODE_JUPITER_IP:-10.0.0.248}:${SERVICE_ORCHESTRATOR_PORT:-8888}
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-changeme}
      - API_TOKEN=${API_TOKEN:?API_TOKEN must be set in .env}
    depends_on:
      - orchestrator
    networks:
      - gateway-net

  model-server:
    image: nginx:alpine
    container_name: model-server
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SERVICE_MODEL_SERVER_PORT:-8080}:80"
    volumes:
      - ${GATEWAY_ROOT_PATH:-/opt/jupiter/gateway_mvp}/models:/usr/share/nginx/html:ro
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge

volumes:
  open-webui-data:
  redis-data:
  brain-audio:
  pihole-etc:
  pihole-dnsmasq:
  finance-data:
  searxng-data:

