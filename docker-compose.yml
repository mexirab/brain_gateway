# Brain Gateway Docker Compose
# ============================
# Environment variables loaded from .env file.
# Run scripts/setup.sh to generate .env, or copy from .env.example.
#
# Usage:
#   ./scripts/setup.sh   # interactive setup (recommended)
#   # OR: cp .env.example .env && edit .env
#   docker compose up -d

# Shared logging config to reduce disk I/O
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SERVICE_WEBUI_PORT:-80}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_AUTH=False
      - WEBUI_NAME=${WEBUI_NAME:-Brain Gateway}
      # Route Open WebUI OpenAI-compatible calls through the orchestrator
      - OPENAI_API_BASE_URL=http://orchestrator:${SERVICE_ORCHESTRATOR_PORT:-8888}/v1
      - OPENAI_API_KEY=${API_TOKEN:?API_TOKEN must be set in .env}
      - REDIS_URL=redis://redis:6379/0
      # TTS configuration — routed through the orchestrator so responses get a
      # ~150ms silence pre-roll (kills per-sentence first-word stutter) and
      # synthesis latency shows up in bgw_voice_tts_seconds
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://orchestrator:${SERVICE_ORCHESTRATOR_PORT:-8888}/v1
      - AUDIO_TTS_OPENAI_API_KEY=${API_TOKEN:?API_TOKEN must be set in .env}
      - AUDIO_TTS_VOICE=${TTS_VOICE:-jessica}
      - AUDIO_TTS_SPLIT_ON=sentence
      # STT configuration — routed through the orchestrator so voice-mic turns
      # get tagged for the voice-pipeline histogram (beacon set in routes_vision)
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=http://orchestrator:${SERVICE_ORCHESTRATOR_PORT:-8888}/v1
      - AUDIO_STT_OPENAI_API_KEY=${API_TOKEN:?API_TOKEN must be set in .env}
      - AUDIO_STT_MODEL=whisper-1
      # Disable auto title generation — it fires a full LLM call after every
      # turn (~15s on Qwen3.5-27B) and can queue behind the next voice turn.
      - ENABLE_TITLE_GENERATION=false
      - ENABLE_TAGS_GENERATION=false
    depends_on:
      - orchestrator
      - redis
    networks:
      - gateway-net

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: brain-orchestrator
    restart: unless-stopped
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SERVICE_ORCHESTRATOR_PORT:-8888}:8888"
    volumes:
      # Mount ChromaDB data
      - ${CHROMA_HOST_PATH:-./data/chroma}:/chroma:rw
      # Mount env file
      - ${GATEWAY_ROOT_PATH:-.}/.env:/app/.env:ro
      # Mount RAG data for write access (medications, projects)
      - ${RAG_BASE:-./data/rag}:/rag:rw
      # Mount SSH keys for remote model server management (optional)
      - ${SSH_KEY_PATH:-/dev/null}:/root/.ssh/id_ed25519:ro
      - ${SSH_KNOWN_HOSTS:-/dev/null}:/root/.ssh/known_hosts:ro
      # Mount Google OAuth2 credentials (rw needed for token refresh)
      - ${GATEWAY_ROOT_PATH:-.}/credentials:/app/credentials:rw
      # Persistent storage for reminder audio files
      - brain-audio:/tmp/brain_audio:rw
      # HuggingFace model cache — persisted across restarts so the embedding
      # model (nomic-embed-text-v2-moe, ~1.8GB) doesn't re-download on every
      # boot. Bind mount for backup/inspection parity with the rest of data/.
      - ${GATEWAY_ROOT_PATH:-.}/data/hf_cache:/root/.cache/huggingface:rw
      # Application runtime state: progress.db, brain_state.db, finance.db,
      # auto_learn.key. Was previously the `finance-data` Docker-managed
      # named volume, which was fragile — `docker compose down -v` or
      # `docker volume rm` silently wiped reminders, focus sessions, streaks,
      # and the auto-learn encryption key. Migrated 2026-04-14 to a host
      # bind mount so state lives in a backup-friendly inspectable path.
      - ${GATEWAY_ROOT_PATH:-.}/data/app:/app/data:rw
      # Document vault storage (optional)
      - ${DOCUMENTS_PATH:-./data/documents}:/mnt/documents:rw
      # User profile (personal config — names, speakers, sensors, etc.)
      - ${GATEWAY_ROOT_PATH:-.}/user_profile.yaml:/app/user_profile.yaml:ro
      # Routine definitions (F-006)
      - ${GATEWAY_ROOT_PATH:-.}/data/routines.yaml:/app/config/routines.yaml:ro
      # MemPalace structure config
      - ${GATEWAY_ROOT_PATH:-.}/data/palace.yaml:/app/config/palace.yaml:ro
      # Admin scripts (read-only) — one-off operational tools like
      # import_budget.py that operate on data inside the container.
      - ${GATEWAY_ROOT_PATH:-.}/scripts:/app/scripts:ro
      # Claude Code session files (read-only) — lets Jess see what Claude Code
      # has been working on for self-troubleshooting + code_agent context.
      # Host path is configurable; container path is fixed (matches
      # CLAUDE_PROJECTS_PATH env var in the environment block below).
      - ${CLAUDE_PROJECTS_HOST_PATH:-/home/labadmin/.claude/projects}:/root/.claude/projects:ro
      # Open WebUI sqlite db (read-only) — nightly training-corpus drain job
      # snapshots user/assistant turns from OWUI into an append-only JSONL
      # under /app/data/training_corpus/. Sharing the named volume is safe
      # because the drain only reads; OWUI owns all writes.
      - open-webui-data:/app/owui_data:ro
      # Codebase access for code_agent (read-only by default)
      - ${GATEWAY_ROOT_PATH:-.}:/opt/gateway_mvp:ro
    environment:
      # Primary model (conversation + tools) — set MODEL_URL in .env
      - MODEL_URL=${MODEL_URL:-http://localhost:8080/v1}
      - MODEL_NAME=${MODEL_NAME:-}
      # Fallback model (empty = disabled)
      - FALLBACK_MODEL_URL=${FALLBACK_MODEL_URL:-}
      - FALLBACK_MODEL_NAME=${FALLBACK_MODEL_NAME:-}
      # Embedding model
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v2-moe}
      # Home Assistant (empty = disabled)
      - HA_URL=${HA_URL:-}
      - HA_TOKEN=${HA_TOKEN:-}
      # ChromaDB / RAG
      - CHROMA_PERSIST=/chroma/personal_rag
      # CHROMA_COLLECTION was used by the pre-MemPalace flat RAG. Now
      # unused at runtime (shared.py reads settings.palace_collection),
      # but kept as an env var for any external tooling that still
      # references the old collection name.
      - CHROMA_COLLECTION=${CHROMA_COLLECTION:-mempalace}
      # Bumped from 0.20 → 0.50 on 2026-04-16: at 0.20, borderline chunks
      # (cos ~0.35-0.45) were being kept and bloating prefill latency by
      # ~600 tokens on every voice turn. 0.50 keeps only chunks with clear
      # semantic match, dropping moderate-similarity noise.
      - MIN_COS=${MIN_COS:-0.50}
      # TOP_K is the retrieval size AND the floor on chunks returned per
      # turn (see prompt_builder.py: MIN_RESULTS = TOP_K). 25 floods the
      # primary LLM's prefill context and was contributing ~10s of turn
      # latency in voice conversation mode.
      - TOP_K=${TOP_K:-10}
      - RAG_BASE=/rag
      # TTS (empty = disabled)
      - TTS_URL=${TTS_URL:-}
      - TTS_VOICE=${TTS_VOICE:-jessica}
      # STT — used by /v1/audio/transcriptions to proxy OWUI mic audio to
      # Whisper while setting the voice beacon for pipeline metrics
      - STT_URL=${STT_URL:-}
      # Callback URL (used for HA notifications pointing back to orchestrator)
      - ORCHESTRATOR_URL=${ORCHESTRATOR_URL:-http://localhost:${SERVICE_ORCHESTRATOR_PORT:-8888}}
      # SSH for remote model server management (empty = disabled)
      - MODEL_SERVER_IP=${MODEL_SERVER_IP:-}
      - MODEL_SSH_USER=${MODEL_SSH_USER:-}
      # Reminders (empty speaker = skip TTS announcements; may be comma-separated)
      - REMINDER_SPEAKER=${REMINDER_SPEAKER:-}
      - TZ=${TZ:-America/Chicago}
      # Agentic settings
      - MAX_TOOL_ROUNDS=${MAX_TOOL_ROUNDS:-5}
      # Pi-hole focus blocking (empty = disabled)
      - PIHOLE_URLS=${PIHOLE_URLS:-}
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD:-}
      - PIHOLE_FOCUS_GROUP=${PIHOLE_FOCUS_GROUP:-focus_blocklist}
      - FOCUS_BLOCKING_ENABLED=${FOCUS_BLOCKING_ENABLED:-false}
      # Focus audio (empty = disabled)
      - FOCUS_AUDIO_PLAYER=${FOCUS_AUDIO_PLAYER:-}
      # SearXNG web search
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - SEARXNG_MAX_RESULTS=${SEARXNG_MAX_RESULTS:-5}
      # Google Calendar (empty paths = disabled)
      - GOOGLE_CREDENTIALS_PATH=${GOOGLE_CREDENTIALS_PATH:-/app/credentials/google_credentials.json}
      - GOOGLE_TOKEN_PATH=${GOOGLE_TOKEN_PATH:-/app/credentials/google_token.json}
      - CALENDAR_POLL_INTERVAL=${CALENDAR_POLL_INTERVAL:-5}
      - CALENDAR_TIERED_ALERTS=${CALENDAR_TIERED_ALERTS:-true}
      - CALENDAR_ALERT_TIERS=${CALENDAR_ALERT_TIERS:-60,30,15,5}
      - MORNING_BRIEFING_TIME=${MORNING_BRIEFING_TIME:-07:00}
      - MORNING_BRIEFING_ENABLED=${MORNING_BRIEFING_ENABLED:-false}
      - MORNING_BRIEFING_SPEAKER=${MORNING_BRIEFING_SPEAKER:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - TRAVEL_TIME_BUFFER=${TRAVEL_TIME_BUFFER:-10}
      # Finance
      - FINANCE_DB_PATH=/app/data/finance.db
      # YNAB integration (empty = disabled)
      - YNAB_ACCESS_TOKEN=${YNAB_ACCESS_TOKEN:-}
      - YNAB_BUDGET_ID=${YNAB_BUDGET_ID:-}
      - YNAB_SYNC_INTERVAL=${YNAB_SYNC_INTERVAL:-30}
      - YNAB_FUN_MONEY_CATEGORY=${YNAB_FUN_MONEY_CATEGORY:-Fun Money}
      # Open WebUI deep link (for notification tap → chat)
      - WEBUI_URL=${WEBUI_URL:-}
      # API authentication
      - API_TOKEN=${API_TOKEN:?API_TOKEN must be set in .env}
      # Rate limiting (per-IP sliding window; default 30/min is too tight
      # for the dashboard which fans out parallel calls from one proxy IP)
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-300}
      # Auto-learn from conversations
      - AUTO_LEARN_ENABLED=${AUTO_LEARN_ENABLED:-true}
      - AUTO_LEARN_DELAY_MINUTES=${AUTO_LEARN_DELAY_MINUTES:-10}
      - AUTO_LEARN_MAX_FACTS=${AUTO_LEARN_MAX_FACTS:-5}
      - AUTO_LEARN_DEDUP_THRESHOLD=${AUTO_LEARN_DEDUP_THRESHOLD:-0.85}
      - AUTO_LEARN_MARKDOWN=${AUTO_LEARN_MARKDOWN:-true}
      - AUTO_LEARN_ENCRYPT=${AUTO_LEARN_ENCRYPT:-true}
      - AUTO_LEARN_ENCRYPTION_KEY=${AUTO_LEARN_ENCRYPTION_KEY:-}
      # Vision / image recognition (empty URL = disabled)
      - VISION_ENABLED=${VISION_ENABLED:-false}
      - VISION_MODEL_URL=${VISION_MODEL_URL:-}
      - VISION_MODEL_NAME=${VISION_MODEL_NAME:-Qwen3VL-8B-Instruct-Q4_K_M.gguf}
      - VISION_MAX_IMAGE_SIZE=${VISION_MAX_IMAGE_SIZE:-10485760}
      - VISION_TIMEOUT=${VISION_TIMEOUT:-60}
      # Code Agent (coding model for self-troubleshooting)
      - CODE_AGENT_ENABLED=${CODE_AGENT_ENABLED:-false}
      - CODE_AGENT_MODEL_URL=${CODE_AGENT_MODEL_URL:-}
      - CODE_AGENT_MODEL_NAME=${CODE_AGENT_MODEL_NAME:-}
      - CODE_AGENT_CODEBASE_PATH=${CODE_AGENT_CODEBASE_PATH:-/opt/gateway_mvp}
      - CODE_AGENT_MAX_ROUNDS=${CODE_AGENT_MAX_ROUNDS:-10}
      # Presence awareness (empty entity = disabled)
      - PRESENCE_ENABLED=${PRESENCE_ENABLED:-false}
      - PRESENCE_ENTITY=${PRESENCE_ENTITY:-}
      - PRESENCE_MOTION_SENSORS=${PRESENCE_MOTION_SENSORS:-{}}
      - PRESENCE_POLL_INTERVAL=${PRESENCE_POLL_INTERVAL:-60}
      - PRESENCE_TARGETED_TTS=${PRESENCE_TARGETED_TTS:-true}
      - PRESENCE_WELCOME_HOME=${PRESENCE_WELCOME_HOME:-true}
      - PRESENCE_WELCOME_COOLDOWN=${PRESENCE_WELCOME_COOLDOWN:-30}
      # MemPalace
      - PALACE_ENABLED=${PALACE_ENABLED:-true}
      - PALACE_COLLECTION=${PALACE_COLLECTION:-mempalace}
      - PALACE_YAML_PATH=/app/config/palace.yaml
      - PALACE_WAKEUP_ENABLED=${PALACE_WAKEUP_ENABLED:-true}
      - PALACE_DEDUP_THRESHOLD=${PALACE_DEDUP_THRESHOLD:-0.85}
      # Container-side path for Claude Code session files (matches the bind
      # mount target above). All session file lookups are constrained under
      # this root for security.
      - CLAUDE_PROJECTS_PATH=/root/.claude/projects
      # CORS for frontend
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3001}
      # Paperless-ngx bridge (F-012) — hand off files for OCR + tagging.
      # Disabled by default; set PAPERLESS_ENABLED=true plus URL and API
      # token in .env to turn on. Inbox staging dir is bind-mounted below.
      - PAPERLESS_ENABLED=${PAPERLESS_ENABLED:-false}
      - PAPERLESS_URL=${PAPERLESS_URL:-}
      - PAPERLESS_API_TOKEN=${PAPERLESS_API_TOKEN:-}
      - PAPERLESS_INBOX_PATH=/app/data/paperless_inbox
      - PAPERLESS_DEFAULT_TAGS=${PAPERLESS_DEFAULT_TAGS:-}
      - PAPERLESS_UPLOAD_TIMEOUT_SECONDS=${PAPERLESS_UPLOAD_TIMEOUT_SECONDS:-30}
      # ntfy feedback loop (F-011) — third reminder delivery channel with
      # Done/Snooze action buttons. Disabled by default; set NTFY_ENABLED=true
      # plus URL/callback/secret in .env to turn it on.
      - NTFY_ENABLED=${NTFY_ENABLED:-false}
      - NTFY_URL=${NTFY_URL:-}
      - NTFY_TOPIC=${NTFY_TOPIC:-jess-reminders}
      - NTFY_DEFAULT_PRIORITY=${NTFY_DEFAULT_PRIORITY:-3}
      - NTFY_CALLBACK_BASE_URL=${NTFY_CALLBACK_BASE_URL:-}
      - NTFY_HMAC_SECRET=${NTFY_HMAC_SECRET:-}
      - NTFY_ACK_EXP_SECONDS=${NTFY_ACK_EXP_SECONDS:-1800}
      - NTFY_MAX_SNOOZE_COUNT=${NTFY_MAX_SNOOZE_COUNT:-5}
      - NTFY_CONFIRM_ENABLED=${NTFY_CONFIRM_ENABLED:-false}
      # Pushover bridge (F-013) — parallel iOS push channel with more
      # reliable APNs delivery than self-hosted ntfy. Disabled by default;
      # set PUSHOVER_ENABLED=true + user key + app token in .env to turn on.
      - PUSHOVER_ENABLED=${PUSHOVER_ENABLED:-false}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY:-}
      - PUSHOVER_APP_TOKEN=${PUSHOVER_APP_TOKEN:-}
      - PUSHOVER_DEFAULT_PRIORITY=${PUSHOVER_DEFAULT_PRIORITY:-0}
      - PUSHOVER_UPLOAD_TIMEOUT_SECONDS=${PUSHOVER_UPLOAD_TIMEOUT_SECONDS:-10}
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - gateway-net

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    logging: *default-logging

    network_mode: "host"

    environment:
      - TZ=${TZ:-America/Chicago}
      - FTLCONF_webserver_api_password=${PIHOLE_PASSWORD:-}
      - FTLCONF_dns_listeningMode=all
      # keep your UI on 8053
      - FTLCONF_webserver_port=${PIHOLE_WEB_PORT:-8053}

    volumes:
      - pihole-etc:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d

    cap_add:
      - NET_ADMIN
      - NET_RAW
  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    container_name: nebula-sync
    restart: unless-stopped
    logging: *default-logging
    environment:
      # Derive nebula-sync endpoints from existing env vars so the password
      # only needs to be set once. Format is url|password (pipe-separated).
      - PRIMARY=http://${NODE_JUPITER_IP:-10.0.0.248}:${PIHOLE_WEB_PORT:-8053}|${PIHOLE_PASSWORD}
      - REPLICAS=http://${NODE_SATURN_IP:-10.0.0.58}:${PIHOLE_WEB_PORT:-8053}|${PIHOLE_PASSWORD}
      - FULL_SYNC=true
      - RUN_GRAVITY=true
      # IMPORTANT: Pi-hole v6's /api/teleporter import endpoint unconditionally
      # restarts FTL on the replica, which takes the webserver down for ~7 minutes.
      # This is Pi-hole behavior — partial sync mode doesn't avoid it because
      # nebula-sync still POSTs to /api/teleporter in both modes.
      #
      # Sync frequency is therefore a direct tradeoff between replica uptime
      # and config freshness. Daily at 4am off-peak means Saturn is up >99.5%
      # of the time instead of ~50%, at the cost of up to 24h staleness on
      # block lists (which change less than weekly in practice).
      # If you need an immediate sync, `docker restart nebula-sync`.
      - CRON=0 4 * * *
      - TZ=${TZ:-America/Chicago}
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SEARXNG_PORT:-8090}:8080"
    volumes:
      - searxng-data:/etc/searxng
      - ${GATEWAY_ROOT_PATH:-.}/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8090}/
    networks:
      - gateway-net

  wyoming-whisper:
    build:
      context: ./tts
      dockerfile: Dockerfile.wyoming-whisper
    container_name: wyoming-whisper
    restart: unless-stopped
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WYOMING_WHISPER_PORT:-10300}:10300"
    environment:
      - TZ=${TZ:-America/Chicago}
    command: >-
      --uri tcp://0.0.0.0:10300
      --stt-url ${STT_URL:-http://localhost:${SERVICE_STT_PORT:-8003}}
      --language en
    networks:
      - gateway-net

  wyoming-jessica-tts:
    build:
      context: ./tts
      dockerfile: Dockerfile.wyoming-jessica
    container_name: wyoming-jessica-tts
    restart: unless-stopped
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WYOMING_JESSICA_PORT:-10301}:10301"
    environment:
      - TZ=${TZ:-America/Chicago}
    command: >-
      --uri tcp://0.0.0.0:10301
      --tts-url ${TTS_URL:-http://localhost:${SERVICE_TTS_PORT:-8002}}
      --voice ${TTS_VOICE:-jessica}
    networks:
      - gateway-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brain-frontend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SERVICE_FRONTEND_PORT:-3001}:3001"
    environment:
      # Client code hits same-origin /api/proxy/* which the Next.js server forwards here.
      - ORCHESTRATOR_URL=http://orchestrator:${SERVICE_ORCHESTRATOR_PORT:-8888}
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-changeme}
      - API_TOKEN=${API_TOKEN:?API_TOKEN must be set in .env}
    depends_on:
      - orchestrator
    networks:
      - gateway-net

  model-server:
    image: nginx:alpine
    container_name: model-server
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SERVICE_MODEL_SERVER_PORT:-8080}:80"
    volumes:
      - ${GATEWAY_ROOT_PATH:-.}/models:/usr/share/nginx/html:ro
    networks:
      - gateway-net

  # Ships Helios Docker logs to Loki on Jupiter. The monitoring stack itself
  # runs on Jupiter; its local promtail only sees Jupiter's containers. This
  # sidecar gives Loki visibility into brain-orchestrator + friends.
  #
  # Hardening notes:
  # - Image is pinned by digest. The Docker socket mount gives this container
  #   read access to every container's env (which contains secrets), so a
  #   :latest tag would be a supply-chain footgun. Bump deliberately when you
  #   want a new version.
  # - cap_drop: ALL + no-new-privileges: promtail needs no Linux capabilities
  #   to read a socket and POST HTTP.
  # - Isolated on its own bridge network (no gateway-net membership) so a
  #   compromised promtail can't reach orchestrator/redis/open-webui over
  #   Docker's internal DNS. It only needs outbound to Jupiter (via host LAN)
  #   and the Docker socket (host mount).
  promtail:
    image: grafana/promtail:3.4.2@sha256:c6e9a987ca086cbfef945b8ebd708eb09f98b5e78bfb659e4e5a8b3bd604d11b
    container_name: promtail-helios
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./monitoring/promtail/promtail-helios.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Read-only systemd journal mount for F-014 self-audit. Promtail's
      # `journal:` scrape stage reads /var/log/journal directly. Both
      # /var/log/journal and /etc/machine-id are required (machine-id is
      # how journalctl correlates volatile vs persistent journals).
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - promtail-helios-data:/tmp
    environment:
      - LOKI_PUSH_URL=${LOKI_PUSH_URL:-http://jupiter-amds.tail74fc4a.ts.net:3100/loki/api/v1/push}
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    networks:
      - promtail-net

networks:
  gateway-net:
    driver: bridge
  # Isolated bridge for promtail so a supply-chain compromise of the promtail
  # image can't reach the rest of the stack over Docker DNS. Promtail only
  # needs outbound to Jupiter's Loki push URL (via host LAN routing), not
  # container-to-container reachability.
  promtail-net:
    driver: bridge

volumes:
  open-webui-data:
  redis-data:
  brain-audio:
  pihole-etc:
  pihole-dnsmasq:
  searxng-data:
  promtail-helios-data:
  # Note: `finance-data:` named volume was removed 2026-04-14 when /app/data
  # was migrated to a host bind mount. The old volume may still exist on the
  # Docker host until manually removed with `docker volume rm
  # gateway_mvp_finance-data`. Leave it around for a day or two as a rollback
  # safety net, then clean up.

