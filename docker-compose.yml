# Updated docker-compose.yml for /opt/voyager/gateway_mvp/
# Adds the Brain Orchestrator service

# Shared logging config to reduce disk I/O
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_AUTH=False
      - WEBUI_NAME=Nadim's Brain
      # Point to orchestrator instead of litellm directly
      - OPENAI_API_BASE_URL=http://orchestrator:8888/v1
      - OPENAI_API_KEY=local
      - REDIS_URL=redis://redis:6379/0
      # TTS configuration - Qwen3-TTS on Uranus GPU 0
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://10.0.0.173:8002/v1
      - AUDIO_TTS_OPENAI_API_KEY=local
      - AUDIO_TTS_VOICE=jessica
      # STT configuration - Whisper on Uranus GPU 1
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=http://10.0.0.173:8003/v1
      - AUDIO_STT_OPENAI_API_KEY=local
      - AUDIO_STT_MODEL=whisper-1
    depends_on:
      - orchestrator
      - redis
    networks:
      - gateway-net

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: brain-orchestrator
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8888:8888"
    volumes:
      # Mount ChromaDB data
      - /home/nadim/.local/share/chroma:/chroma:rw
      # Mount env file
      - /home/nadim/brain_gateway/.env:/app/.env:ro
      # Mount RAG data for write access (medications, projects)
      - /home/nadim/rag/nadim_rag:/rag:rw
      # Mount SSH keys for Helios auto-start
      - /home/nadim/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - /home/nadim/.ssh/known_hosts:/root/.ssh/known_hosts:ro
      # Persistent storage for reminder audio files
      - brain-audio:/tmp/brain_audio:rw
    environment:
      - NEMOTRON_URL=http://10.0.0.58:8001/v1
      - HELIOS_URL=http://10.0.0.195:8080/v1
      - HA_URL=http://10.0.0.106:8123
      - HA_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI5YjcwZmQ0YWJmMTY0OWEyOTQ4YjIzYTQ4YjQ1NDlhNCIsImlhdCI6MTc2Nzg5MzE0MSwiZXhwIjoyMDgzMjUzMTQxfQ.7n2TOJrEH1hMGM1e-vlEatj9bnGg13qmcihXU0nbI7o
      - CHROMA_PERSIST=/chroma/personal_rag
      - CHROMA_COLLECTION=nadim_rag
      - MIN_COS=0.20
      - TOP_K=25
      - RAG_BASE=/rag
      - TTS_URL=http://10.0.0.173:8002
      - TTS_VOICE=jessica
      - ORCHESTRATOR_URL=http://10.0.0.186:8888
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000
    networks:
      - gateway-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - gateway-net

  model-server:
    image: nginx:alpine
    container_name: model-server
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8080:80"
    volumes:
      - /opt/voyager/gateway_mvp/models:/usr/share/nginx/html:ro
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge

volumes:
  open-webui-data:
  redis-data:
  brain-audio:

