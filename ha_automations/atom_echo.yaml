# ATOM Echo Voice Assistant Configuration
# ========================================
# Note: Original ATOM Echo uses ESP32-PICO (not S3), so on-device wake word
# (micro_wake_word) is NOT supported. Wake word detection runs on Home Assistant
# via openWakeWord instead.
#
# For on-device wake word, you need M5Stack ATOM Echo S3 or other ESP32-S3 device.

substitutions:
  name: atom-echo-jess
  friendly_name: Jess Voice Assistant

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.2.0
  on_boot:
    priority: 600
    then:
      - delay: 2s
      - voice_assistant.start_continuous

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    version: recommended

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "Atom-Echo-Jess"
    password: "jessvoice"

captive_portal:

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19

microphone:
  - platform: i2s_audio
    id: echo_microphone
    i2s_din_pin: GPIO23
    adc_type: external
    pdm: true
    sample_rate: 16000
    bits_per_sample: 16bit

speaker:
  - platform: i2s_audio
    id: echo_speaker
    i2s_dout_pin: GPIO22
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit

voice_assistant:
  id: va
  microphone: echo_microphone
  speaker: echo_speaker
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  # Use HA-based wake word (openWakeWord runs on HA server)
  use_wake_word: true
  on_wake_word_detected:
    - light.turn_on:
        id: led
        red: 0%
        green: 100%
        blue: 100%
        brightness: 100%
  on_listening:
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        brightness: 100%
  on_stt_vad_end:
    - light.turn_on:
        id: led
        blue: 0%
        red: 0%
        green: 100%
        brightness: 100%
  on_tts_start:
    - light.turn_on:
        id: led
        blue: 50%
        red: 0%
        green: 50%
        brightness: 100%
  on_tts_end:
    - light.turn_off: led
  on_end:
    - light.turn_off: led
  on_error:
    - light.turn_on:
        id: led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 100%
    - delay: 2s
    - light.turn_off: led

light:
  - platform: esp32_rmt_led_strip
    id: led
    name: "Status LED"
    pin: GPIO27
    num_leds: 1
    chipset: SK6812
    rgb_order: GRB

binary_sensor:
  - platform: gpio
    id: button
    name: "Wake Button"
    pin:
      number: GPIO39
      inverted: true
    on_press:
      - voice_assistant.start
