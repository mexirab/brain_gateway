# ATOM Echo S3R Voice Assistant Configuration
# =============================================
# M5Stack ATOM Echo S3R (ESP32-S3 + ES8311 codec)
# On-device wake word: "Hey Jess" via microWakeWord
#
# Flash: esphome run atom_echo.yaml --device /dev/ttyACM0
# OTA updates after first flash.
#
# Multi-room: override substitutions per device:
#   esphome run atom_echo.yaml -s name atom-echo-office -s friendly_name "Office Jess"

substitutions:
  name: atom-echo-jess
  friendly_name: Jess Voice Assistant

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.11.0
  on_boot:
    priority: 600
    then:
      - delay: 2s
      - micro_wake_word.start

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
  flash_size: 8MB

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "Atom-Echo-Jess"
    password: "jessvoice"

captive_portal:

# ES8311 codec communicates over I2C
i2c:
  sda: GPIO45
  scl: GPIO0

# I2S audio bus (ES8311 codec)
i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO3
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO11

microphone:
  - platform: i2s_audio
    id: echo_microphone
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit

speaker:
  - platform: i2s_audio
    id: echo_speaker
    i2s_dout_pin: GPIO48
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit

# On-device wake word detection (ESP32-S3 only)
# Note: ATOM Echo S3R has no programmable RGB LED (green LED behind
# reset button is not GPIO-accessible). Uses audio feedback instead.
micro_wake_word:
  models:
    - model: http://10.0.0.248:8080/hey_jess.json
  on_wake_word_detected:
    - voice_assistant.start

voice_assistant:
  id: va
  microphone: echo_microphone
  speaker: echo_speaker
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_tts_end:
    - micro_wake_word.start
  on_end:
    - micro_wake_word.start
  on_error:
    - delay: 2s
    - micro_wake_word.start

binary_sensor:
  - platform: gpio
    id: button
    name: "Wake Button"
    pin:
      number: GPIO41
      inverted: true
    on_press:
      - voice_assistant.start
