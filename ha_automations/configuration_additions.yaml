# Home Assistant Configuration Additions for Voice PE
# ==================================================
# Add these sections to your configuration.yaml
#
# Voice Pipeline: Voice PE -> STT (Helios) -> Brain Gateway -> TTS (Helios) -> Voice PE

# -----------------------------------------------------------------------------
# REST Commands - Brain Gateway Integration
# -----------------------------------------------------------------------------
rest_command:
  brain_gateway_chat:
    url: "http://10.0.0.195:8888/v1/chat/completions"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "model": "brain",
        "messages": [
          {
            "role": "system",
            "content": "You are a supportive ADHD assistant named Jess. Be warm, encouraging, and concise. Help with medication reminders, motivation, and getting out of spirals. Keep responses brief and conversational for voice interaction. Speak naturally like a supportive friend."
          },
          {
            "role": "user",
            "content": "{{ text }}"
          }
        ],
        "max_tokens": 200
      }
    content_type: "application/json"
    timeout: 30

  generate_morning_briefing:
    url: "http://10.0.0.195:8888/api/briefing/morning"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: '{"generate_tts": false}'
    content_type: "application/json"

# -----------------------------------------------------------------------------
# Helios is always-on in v7 — no shell commands for start/stop/status needed.
# (v6 used Helios as an on-demand "expert" model that auto-started; that flow is retired.)
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Template Sensors - Brain Gateway Status
# -----------------------------------------------------------------------------
template:
  - sensor:
      - name: "Brain Gateway Status"
        unique_id: brain_gateway_status
        state: >
          {% if is_state('binary_sensor.brain_gateway_health', 'on') %}
            Online
          {% else %}
            Offline
          {% endif %}
        icon: mdi:brain

# -----------------------------------------------------------------------------
# Binary Sensors - Health Monitoring
# -----------------------------------------------------------------------------
binary_sensor:
  - platform: ping
    host: 10.0.0.195
    name: Brain Gateway Health
    count: 2
    scan_interval: 60

# -----------------------------------------------------------------------------
# RESTful Sensors - Detailed Health
# -----------------------------------------------------------------------------
sensor:
  - platform: rest
    name: Brain Gateway Details
    resource: http://10.0.0.195:8888/health
    json_attributes:
      - status
      - chromadb
      - home_assistant
    value_template: "{{ value_json.ok }}"
    scan_interval: 300
