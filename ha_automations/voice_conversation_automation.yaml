# Voice Conversation Automation for Brain Gateway
# ===============================================
# This automation handles voice commands when the built-in conversation
# agent integration doesn't work with your custom API.
#
# ATOM Echo devices capture wake words and stream audio to HA.
# TTS responses are routed to Google speakers for better audio quality.
#
# Add this to your automations.yaml

# -----------------------------------------------------------------------------
# Main Conversation Handler
# -----------------------------------------------------------------------------
- alias: "Brain Gateway Voice Conversation"
  id: brain_gateway_voice_conversation
  description: "Route voice commands to Brain Gateway and play TTS response on Google speakers"
  mode: queued
  max: 5

  trigger:
    - platform: conversation
      command:
        - "{query}"  # Catch-all for any voice command

  action:
    # Call Brain Gateway
    - service: rest_command.brain_gateway_chat
      data:
        text: "{{ trigger.sentence }}"
      response_variable: brain_response

    # Extract the response text and determine target speaker
    - variables:
        response_text: >
          {{ brain_response.content.choices[0].message.content
             | default('Sorry, I could not process that. Please try again.') }}
        # Map ATOM Echo device to nearest Google speaker, or use default
        target_speaker: >
          {% set device = trigger.device_id | default('') %}
          {% set room_map = {
            'atom_echo_jess': states('input_select.jess_default_speaker'),
            'atom_echo_office': 'media_player.office_speaker',
            'atom_echo_bedroom': 'media_player.bedroom_speaker',
            'atom_echo_kitchen': 'media_player.kitchen_speaker',
            'atom_echo_living': 'media_player.living_room_speaker'
          } %}
          {% if device in room_map %}
            {{ room_map[device] }}
          {% else %}
            {{ states('input_select.jess_default_speaker') }}
          {% endif %}

    # Store last response for debugging
    - service: input_text.set_value
      target:
        entity_id: input_text.last_voice_response
      data:
        value: "{{ response_text[:500] }}"

    # Play TTS response on Google speaker
    - service: tts.speak
      target:
        entity_id: "{{ target_speaker }}"
      data:
        message: "{{ response_text }}"
        media_player_entity_id: "{{ target_speaker }}"

# -----------------------------------------------------------------------------
# ADHD Support Quick Commands
# -----------------------------------------------------------------------------
# TTS output goes to Google speakers for better audio quality.
# ATOM Echo serves as wake word detector and microphone only.

- alias: "ADHD Medication Reminder Request"
  id: adhd_medication_reminder
  description: "Handle medication reminder requests"
  mode: single

  trigger:
    - platform: conversation
      command:
        - "remind me to take my [medication|meds|medicine|adderall|vyvanse|ritalin]"
        - "medication reminder"
        - "set a medication reminder"

  variables:
    target_speaker: "{{ states('input_select.jess_default_speaker') }}"

  action:
    - service: rest_command.brain_gateway_chat
      data:
        text: "I need help setting up a medication reminder. Can you encourage me and help me remember?"
      response_variable: brain_response

    - service: tts.speak
      target:
        entity_id: "{{ target_speaker }}"
      data:
        message: "{{ brain_response.content.choices[0].message.content }}"
        media_player_entity_id: "{{ target_speaker }}"

- alias: "ADHD Spiral Help"
  id: adhd_spiral_help
  description: "Help get out of ADHD spirals"
  mode: single

  trigger:
    - platform: conversation
      command:
        - "[i'm|im|i am] stuck [in a spiral|spiraling|in a loop]"
        - "help me [get out|escape] [of|from] [this|a] spiral"
        - "[i'm|im] spiraling"
        - "spiral help"
        - "help me get unstuck"
        - "[i'm|im|i am] [stuck|frozen]"

  variables:
    target_speaker: "{{ states('input_select.jess_default_speaker') }}"

  action:
    - service: rest_command.brain_gateway_chat
      data:
        text: "I'm stuck in an ADHD spiral and need help getting out. Can you give me one simple, concrete step to take right now?"
      response_variable: brain_response

    - service: tts.speak
      target:
        entity_id: "{{ target_speaker }}"
      data:
        message: "{{ brain_response.content.choices[0].message.content }}"
        media_player_entity_id: "{{ target_speaker }}"

