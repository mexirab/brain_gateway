# /opt/jupiter/gateway_mvp/litellm-config.yaml
# Nemotron-Orchestrator as DEFAULT, routes to Helios for heavy tasks
#
# Environment variables are passed through from docker-compose.yml:
#   - NODE_SATURN_IP, NODE_HELIOS_IP
#   - SERVICE_NEMOTRON_PORT, SERVICE_HELIOS_PORT
#   - LITELLM_MASTER_KEY

model_list:
  # ============================================
  # NEMOTRON - Orchestrator (DEFAULT / FIRST HOP)
  # ============================================
  - model_name: brain-orchestrator
    litellm_params:
      model: openai/nvidia/Nemotron-Orchestrator-8B
      api_base: os.environ/NEMOTRON_API_BASE
      api_key: dummy
      timeout: 120

  # ============================================
  # HELIOS - Heavy Reasoning (Qwen3-32B)
  # ============================================
  - model_name: helios-qwen3-32b
    litellm_params:
      model: openai/qwen3-32b
      api_base: os.environ/HELIOS_API_BASE
      api_key: dummy
      timeout: 300

  - model_name: helios
    litellm_params:
      model: openai/qwen3-32b
      api_base: os.environ/HELIOS_API_BASE
      api_key: dummy
      timeout: 300

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - brain-orchestrator: ["helios-qwen3-32b"]
  num_retries: 2

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
