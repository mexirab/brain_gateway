# /opt/helios/gateway_mvp/litellm-config.yaml
# LiteLLM proxy routes Open WebUI requests to the primary model (Helios)
#
# Environment variables are passed through from docker-compose.yml:
#   - MODEL_API_BASE, FALLBACK_API_BASE
#   - LITELLM_MASTER_KEY

model_list:
  # ============================================
  # PRIMARY - Qwen3.5-27B on Helios (RTX 5090)
  # ============================================
  - model_name: brain-primary
    litellm_params:
      model: openai/Qwen3.5-27B
      api_base: os.environ/MODEL_API_BASE
      api_key: dummy
      timeout: 300

  # ============================================
  # FALLBACK - Saturn (when Helios is down)
  # ============================================
  - model_name: brain-fallback
    litellm_params:
      model: openai/Qwen3.5-9B
      api_base: os.environ/FALLBACK_API_BASE
      api_key: dummy
      timeout: 120

  # Alias for backward compatibility with Open WebUI
  - model_name: helios
    litellm_params:
      model: openai/Qwen3.5-27B
      api_base: os.environ/MODEL_API_BASE
      api_key: dummy
      timeout: 300

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - brain-primary: ["brain-fallback"]
  num_retries: 2

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
