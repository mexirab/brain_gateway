# Monitoring Stack for Brain Gateway
# Usage:
#   cd monitoring
#   docker-compose --env-file ../.env -p monitoring up -d
#
# Or from project root:
#   docker-compose -f monitoring/docker-compose.yml -p monitoring up -d
#
# Environment variables are loaded from parent .env file

services:
  # ============================================
  # GRAFANA - Dashboard UI
  # ============================================
  grafana:
    # Digest pinned 2026-04-16 — matches supply-chain posture of promtail
    # pin below. Bump deliberately; `:latest` alone silently upgrades.
    image: grafana/grafana:latest@sha256:2e986801428cd689c2358605289c90ab37d2b39e24808874971f54c99bcdc412
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${MONITORING_GRAFANA_PORT:-3000}:3000"
    volumes:
      - /mnt/logging/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-braingw}
      - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP:-false}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=http://localhost:${MONITORING_GRAFANA_PORT:-3000}
    networks:
      - monitoring-net

  # ============================================
  # PROMETHEUS - Metrics Collection
  # ============================================
  prometheus:
    # Digest pinned 2026-04-16
    image: prom/prometheus:latest@sha256:5550dc63da361dc30f6fe02ac0e4dfc736ededfef3c8d12a634db04a67824d78
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "${MONITORING_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      # DIRECTORY mount, not per-file mounts: a single-file bind is pinned
      # to the inode at container start, and `git pull` (CI deploy) and most
      # editors replace files with new inodes — the container would keep
      # reading the pre-pull file while /-/reload reports success. A
      # directory mount resolves inner files by path on every access.
      # (Bit us 2026-07-06: an alert-rules.yml edit was invisible to the
      # running container until recreate.)
      - ./prometheus:/etc/prometheus:ro
      - /mnt/logging/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-net

  # ============================================
  # LOKI - Log Aggregation
  # ============================================
  loki:
    # Digest pinned 2026-04-16
    image: grafana/loki:latest@sha256:73e905b51a7f917f7a1075e4be68759df30226e03dcb3cd2213b989cc0dc8eb4
    container_name: loki
    restart: unless-stopped
    ports:
      - "${MONITORING_LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - /mnt/logging/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-net

  # ============================================
  # PROMTAIL - Log Shipper (for Docker containers on Jupiter)
  # ============================================
  # Scrapes Jupiter's own Docker socket + conjure's PM2 file logs and
  # pushes to the local Loki. The Helios compose has a second promtail
  # that covers brain-orchestrator et al.
  #
  # Hardening matches the Helios sidecar: image pinned by digest
  # (supply-chain protection — the Docker socket mount gives this
  # container read access to every container's env, which holds secrets),
  # cap_drop ALL, no-new-privileges. Bump the digest deliberately.
  promtail:
    image: grafana/promtail:3.4.2@sha256:c6e9a987ca086cbfef945b8ebd708eb09f98b5e78bfb659e4e5a8b3bd604d11b
    container_name: promtail
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Conjure PM2 logs (bare Node.js process, not Docker)
      - /opt/conjure/server/logs:/opt/conjure/server/logs:ro
    # -config.expand-env mirrors the Helios sidecar so the two configs
    # stay structurally identical; no env vars are used in this config
    # today, but adding it now prevents a future parameterisation from
    # silently no-op'ing.
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    networks:
      - monitoring-net
    depends_on:
      - loki

  # ============================================
  # ALERTMANAGER - Alert Routing (Pushover)
  # ============================================
  # The config is GENERATED: alertmanager/alertmanager.yml is rendered from
  # alertmanager.yml.template by scripts/generate-configs.sh, which injects
  # PUSHOVER_USER_KEY/PUSHOVER_APP_TOKEN from ../.env. The rendered file is
  # gitignored — after editing the template, re-run the generator and
  # `curl -X POST localhost:9093/-/reload` (CI does both on deploy).
  # Folded in here 2026-07-06, replacing a hand-run container that
  # bind-mounted a stale render from the old /opt/gateway_mvp checkout.
  alertmanager:
    # Digest pinned 2026-07-06 — same supply-chain posture as the pins above.
    image: prom/alertmanager:latest@sha256:af26fbe4dd1886ac0efd7bd55cd9027da262e105b137a376522b7c14c3626e4a
    container_name: alertmanager
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      # Loopback-only, deliberately narrower than the hand-run container's
      # 0.0.0.0 bind: the API is unauthenticated (anyone who can reach it
      # can create silences or inject fake "Jess alert" pushes) and every
      # consumer is local — Prometheus/Grafana use in-network DNS
      # (alertmanager:9093), CI reloads via localhost. ufw is inactive on
      # Jupiter, so this bind IS the exposure control.
      - "127.0.0.1:${MONITORING_ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      # Directory mount for the same inode-replacement reason as prometheus
      # above (generate-configs.sh truncates in place, but don't depend on it).
      - ./alertmanager:/etc/alertmanager:ro
      - /mnt/logging/alertmanager:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring-net

  # ============================================
  # BLACKBOX EXPORTER - HTTP Health Probes
  # ============================================
  blackbox-exporter:
    # Digest pinned 2026-04-16
    image: prom/blackbox-exporter:latest@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "${MONITORING_BLACKBOX_PORT:-9115}:9115"
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    networks:
      - monitoring-net

  # NODE EXPORTER runs on host (systemd), not in container

networks:
  monitoring-net:
    driver: bridge

# Data stored on /mnt/logging (sdb1 - 931GB HDD)
