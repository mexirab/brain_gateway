groups:
  - name: brain_gateway_critical
    interval: 30s
    rules:
      # -- Service Health -------------------------------------------------------
      - alert: OrchestratorDown
        expr: up{job="orchestrator"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Brain Gateway orchestrator is down"
          description: "The orchestrator has not responded to /metrics scrapes for 2 minutes."

      - alert: NodeDown
        expr: up{job="node-exporter"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is down"
          description: "Node exporter on {{ $labels.node }} is unreachable for 3 minutes."

      # Dashboard-only by design: when this fires Prometheus can't deliver
      # notifications at all, so routing it anywhere via alertmanager is
      # circular. It exists so the failure is visible in Grafana instead of
      # every alert silently going nowhere.
      - alert: AlertmanagerUnreachable
        expr: prometheus_notifications_alertmanagers_discovered < 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus has no reachable Alertmanager"
          description: "prometheus_notifications_alertmanagers_discovered has been < 1 for 5 minutes — alerts are firing into the void. Check the alertmanager container in the monitoring compose project."

      - alert: TTSDown
        expr: probe_success{service="tts"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TTS service (Helios) is down"
          description: "Jessica TTS has not responded for 5 minutes. Voice output unavailable."

      - alert: STTDown
        expr: probe_success{service="stt"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "STT service (Helios) is down"
          description: "Whisper STT has not responded for 5 minutes. Voice input unavailable."

      # -- Error Rates ----------------------------------------------------------
      - alert: HighErrorRate
        expr: rate(bgw_request_errors_total[5m]) / rate(bgw_requests_total[5m]) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on Brain Gateway (>10%)"
          description: "{{ $value | humanizePercentage }} of requests are failing over the last 5 minutes."

      - alert: HighToolErrorRate
        expr: rate(bgw_tool_call_errors_total[10m]) / rate(bgw_tool_calls_total[10m]) > 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High tool failure rate (>20%)"
          description: "Tool {{ $labels.tool }} is failing at {{ $value | humanizePercentage }}."

      # -- Latency --------------------------------------------------------------
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(bgw_request_duration_seconds_bucket[5m])) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "P95 request latency >30s"
          description: "95th percentile request latency is {{ $value | humanizeDuration }}."

      # -- Resource Alerts ------------------------------------------------------
      - alert: HighGPUTemp
        expr: nvidia_smi_temperature_gpu > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU temperature critical on {{ $labels.node }}"
          description: "GPU temp is {{ $value }}C on {{ $labels.node }}."

      - alert: DiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{mountpoint=~"/|/mnt/logging"} / node_filesystem_size_bytes{mountpoint=~"/|/mnt/logging"}) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk >90% full on {{ $labels.node }} {{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."

      - alert: HighVRAMUsage
        expr: nvidia_smi_memory_used_bytes / nvidia_smi_memory_total_bytes > 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VRAM >95% on {{ $labels.node }}"
          description: "VRAM usage is {{ $value | humanizePercentage }} on {{ $labels.node }}."

  - name: brain_gateway_informational
    interval: 60s
    rules:
      - alert: CalendarPollingFailed
        expr: increase(bgw_calendar_api_errors_total{operation="list_events"}[1h]) > 5
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Calendar polling has >5 errors in the last hour"

      # Real streaming: a stream that dies AFTER emitting returns a silently
      # truncated answer to the user (no user-facing error). Non-paging — it's
      # a UX degradation, not an outage — but on-call should see a sustained
      # rate. for:2m rides out the increase() counter-reset blip on CI restarts.
      - alert: ChatStreamTruncating
        expr: increase(bgw_chat_stream_outcome_total{outcome="died_mid_emission"}[1h]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Chat streams are dying mid-answer — users get truncated replies"
          description: "{{ $value | humanize }} stream(s) died after emitting in the last hour; the user received a silently truncated answer. Check vLLM health and the '[UNIFIED] Stream died mid-answer' lines in Loki."

  # ===========================================================================
  # Self-Hosted App Server (Jupiter)
  # ===========================================================================
  # Lightweight self-hosted apps (Actual Budget, etc.) run on Jupiter and are
  # probed by the blackbox-http job. Every app target carries tier="app", so
  # this one rule covers all of them — adding an app means adding a scrape
  # target in prometheus.yml, not a new alert here.
  - name: app_server
    interval: 30s
    rules:
      - alert: AppDown
        expr: probe_success{tier="app"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Self-hosted app '{{ $labels.service }}' is down"
          description: "{{ $labels.service }} on {{ $labels.node }} has failed its HTTP probe for 2 minutes."

  # ===========================================================================
  # UPS / Power Chain
  # ===========================================================================
  # Both UPSes feed Helios via NUT + nut_exporter on port 9199.
  # CyberPower CP1500PFCLCD = 1000W; Goldenmate 2000VA LiFePO4 (firmware-limited).
  - name: brain_gateway_ups
    interval: 30s
    rules:
      - alert: UPSOnBattery
        # ups_status flag goes 1 the instant grid power is lost. Sustained
        # `for: 30s` lets brief AC blips (transfer test, brownout flicker)
        # not page; anything beyond that is a real outage.
        expr: network_ups_tools_ups_status{flag="OB"} == 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "UPS '{{ $labels.ups }}' on battery"
          description: "Grid lost on {{ $labels.ups }} — running on battery. Check input voltage panel."

      - alert: UPSLowBattery
        # LB flag means the UPS itself thinks it's about to die. Below 20% is the
        # secondary trigger. Either way we want a critical-severity page.
        expr: network_ups_tools_ups_status{flag="LB"} == 1 or network_ups_tools_battery_charge < 20
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "UPS '{{ $labels.ups }}' low battery ({{ $value }}%)"
          description: "Battery at {{ $value }}% — graceful shutdown imminent."

      - alert: UPSReplaceBattery
        expr: network_ups_tools_ups_status{flag="RB"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "UPS '{{ $labels.ups }}' wants battery replaced"
          description: "Self-test reported the battery should be replaced. Doesn't affect runtime today; plan a swap."

      - alert: UPSOverload
        # OVER flag, OR ups.load > 90% sustained.
        expr: network_ups_tools_ups_status{flag="OVER"} == 1 or network_ups_tools_ups_load > 90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "UPS '{{ $labels.ups }}' overloaded ({{ $value }}%)"
          description: "Load >90% of rated capacity. Will cut runtime sharply on grid loss."

      - alert: UPSExporterDown
        # The scrape itself failing — covers nut_exporter container down OR
        # NUT server (upsd) down OR the UPS USB cable yanked.
        expr: up{job="nut"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NUT exporter scrape failing for '{{ $labels.ups }}'"
          description: "Prometheus can't reach the nut_exporter for {{ $labels.ups }}. UPS itself may be fine — check Helios:9199 + upsd."

      - alert: UPSInputVoltageOutOfRange
        # CyberPower only — Goldenmate doesn't expose input.voltage.
        # Wide tolerance — 105V/130V is well past what HVAC/legitimate
        # brownouts cause. AVR (BOOST/TRIM flags) covers normal swings.
        expr: network_ups_tools_input_voltage{ups="cyberpower"} < 105 or network_ups_tools_input_voltage{ups="cyberpower"} > 130
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Wall voltage abnormal: {{ $value }}V on {{ $labels.ups }}"
          description: "Sustained out-of-range input voltage. Brownout, surge, or wiring issue."

  - name: brain_gateway_deadmans
    interval: 60s
    rules:
      - alert: MorningBriefingStale
        expr: time() - bgw_morning_briefing_last_run_timestamp_seconds > 93600 and bgw_morning_briefing_last_run_timestamp_seconds > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Morning briefing has not fired in over a day"
          description: "Last briefing was {{ $value | humanizeDuration }} ago - should run daily; orchestrator/scheduler may be down."
      - alert: EveningBriefingStale
        # 24.5h (not the morning's 26h): for a 21:30 job a 26h threshold turns
        # true ~23:30 and pages at midnight; 24.5h fires at a civilized ~22:30.
        expr: time() - bgw_evening_briefing_last_run_timestamp_seconds > 88200 and bgw_evening_briefing_last_run_timestamp_seconds > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Evening briefing has not fired in over a day"
          description: "Last evening ritual was {{ $value | humanizeDuration }} ago - should run daily; orchestrator/scheduler may be down."
      - alert: WindDownNudgeStale
        # 25.5h, matching the dashboard panel's orange threshold: the largest
        # legitimate gap is 25h (the DST fall-back night) plus the 300s
        # scheduler misfire grace, and 25.5h leaves ~25m of headroom above that.
        # The nudge is a spoken prompt — a dropped rung is invisible by
        # omission, and the feature targets the person least likely to notice.
        # Routed to the quiet (non-paging) Pushover receiver, not "null": a
        # comfort rung shouldn't page at midnight, but it must still surface.
        expr: time() - bgw_wind_down_last_run_timestamp_seconds > 91800 and bgw_wind_down_last_run_timestamp_seconds > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Wind-down nudge has not fired in over a day"
          description: "Last T-30 screens-away nudge was {{ $value | humanizeDuration }} ago - should run nightly; orchestrator/scheduler may have dropped the rung."
      - alert: SchedulerJobsMissed
        # APScheduler silently drops any job whose 300s misfire_grace_time lapses
        # during an event-loop stall (orchestrator/shared.py job_defaults). The
        # EVENT_JOB_MISSED listener (orchestrator.py) bumps this counter, keyed by
        # a bounded job_family. One-shot families (reminder, focus) have no next
        # occurrence and no runtime recovery, so a drop is a permanently lost
        # action. for: 2m (not 0m) only rides out the counter-reset extrapolation
        # blip that increase() can synthesize across an orchestrator restart
        # (in-process counter, CI redeploys on every merge) — a real miss keeps
        # this expr true for the full 15m window, so detection is unaffected.
        expr: sum by (job_family) (increase(bgw_scheduler_jobs_missed_total[15m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Scheduler dropped a '{{ $labels.job_family }}' job"
          description: "The event loop stalled past the 300s misfire grace and APScheduler discarded {{ $value }} '{{ $labels.job_family }}' job(s) in the last 15m. One-shot jobs (reminders, focus breaks) are lost for good — check orchestrator logs for '[SCHEDULER] Job MISSED' and what stalled the loop."
      - alert: GoogleTokenRefreshStale
        expr: time() - jess_google_token_refresh_success_timestamp_seconds > 691200
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Google OAuth token refresh is stale (>8 days)"
          description: "Weekly token refresh has not succeeded in {{ $value | humanizeDuration }}. Check the cron + scripts/refresh_google_token.py."
      - alert: JessBackupStale
        expr: time() - jess_backup_success_timestamp_seconds > 129600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Jess state backup is stale (>36h)"
          description: "The nightly state backup hasn't succeeded in {{ $value | humanizeDuration }}. Check the cron + scripts/backup_state.py — auto_learn.key and the SQLite state are unprotected until it runs."
      - alert: JessHABackupStale
        # Home Assistant now runs on Jupiter (migrated off the failed Pi 2026-07-04).
        # /home/labadmin/homeassistant/backup_ha.sh runs nightly and writes this.
        # >36h stale = a nightly HA backup was missed; the config (.storage/auth,
        # automations, entity registry) is unprotected until it runs.
        expr: time() - jess_ha_backup_success_timestamp_seconds > 129600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Home Assistant backup is stale (>36h)"
          description: "The nightly HA backup hasn't succeeded in {{ $value | humanizeDuration }}. Check the cron + /home/labadmin/homeassistant/backup_ha.sh."
      - alert: JessBackupOffboxFailing
        expr: jess_backup_offbox_success == 0
        for: 3d
        labels:
          severity: info
        annotations:
          summary: "Jess off-box backup copy has been failing for 3 days"
          description: "Local backups are fine, but the rsync to JESS_BACKUP_REMOTE keeps failing — a single-disk loss would still take the state. Check SSH keys / the remote path."
  - name: brain_gateway_routine
    rules:
      - alert: RoutineAutoEnded
        expr: increase(bgw_routine_auto_ended_total[6h]) > 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "Routine auto-ended on a stuck step"
          description: "A routine step nudged past the cap and force-ended. Check the step skippable/auto_skip config."
