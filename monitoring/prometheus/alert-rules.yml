groups:
  - name: brain_gateway_critical
    interval: 30s
    rules:
      # -- Service Health -------------------------------------------------------
      - alert: OrchestratorDown
        expr: up{job="orchestrator"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Brain Gateway orchestrator is down"
          description: "The orchestrator has not responded to /metrics scrapes for 2 minutes."

      - alert: NodeDown
        expr: up{job="node-exporter"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is down"
          description: "Node exporter on {{ $labels.node }} is unreachable for 3 minutes."

      - alert: TTSDown
        expr: probe_success{service="tts"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TTS service (Helios) is down"
          description: "Jessica TTS has not responded for 5 minutes. Voice output unavailable."

      - alert: STTDown
        expr: probe_success{service="stt"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "STT service (Helios) is down"
          description: "Whisper STT has not responded for 5 minutes. Voice input unavailable."

      # -- Error Rates ----------------------------------------------------------
      - alert: HighErrorRate
        expr: rate(bgw_request_errors_total[5m]) / rate(bgw_requests_total[5m]) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on Brain Gateway (>10%)"
          description: "{{ $value | humanizePercentage }} of requests are failing over the last 5 minutes."

      - alert: HighToolErrorRate
        expr: rate(bgw_tool_call_errors_total[10m]) / rate(bgw_tool_calls_total[10m]) > 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High tool failure rate (>20%)"
          description: "Tool {{ $labels.tool }} is failing at {{ $value | humanizePercentage }}."

      # -- Latency --------------------------------------------------------------
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(bgw_request_duration_seconds_bucket[5m])) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "P95 request latency >30s"
          description: "95th percentile request latency is {{ $value | humanizeDuration }}."

      # -- Resource Alerts ------------------------------------------------------
      - alert: HighGPUTemp
        expr: nvidia_smi_temperature_gpu > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU temperature critical on {{ $labels.node }}"
          description: "GPU temp is {{ $value }}C on {{ $labels.node }}."

      - alert: DiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{mountpoint=~"/|/mnt/logging"} / node_filesystem_size_bytes{mountpoint=~"/|/mnt/logging"}) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk >90% full on {{ $labels.node }} {{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."

      - alert: HighVRAMUsage
        expr: nvidia_smi_memory_used_bytes / nvidia_smi_memory_total_bytes > 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VRAM >95% on {{ $labels.node }}"
          description: "VRAM usage is {{ $value | humanizePercentage }} on {{ $labels.node }}."

  - name: brain_gateway_informational
    interval: 60s
    rules:
      - alert: CalendarPollingFailed
        expr: increase(bgw_calendar_api_errors_total{operation="list_events"}[1h]) > 5
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Calendar polling has >5 errors in the last hour"

  # ===========================================================================
  # Dead-man's switches — silent-outage detectors
  # ===========================================================================
  # The orchestrator being down for weeks once looked like a calendar-token
  # problem (it sat unnoticed ~2 months). These page when the daily jobs stop
  # firing or the Google token stops being refreshed, instead of failing quietly.
  - name: brain_gateway_deadmans
    interval: 60s
    rules:
      - alert: MorningBriefingStale
        # Briefing fires daily; >26h without a run means the scheduler stopped.
        # The `> 0` guard keeps this silent when the briefing is disabled (the
        # gauge is 0 until the job is scheduled + first fires).
        expr: time() - bgw_morning_briefing_last_run_timestamp_seconds > 93600 and bgw_morning_briefing_last_run_timestamp_seconds > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Morning briefing hasn't fired in over a day"
          description: "Last briefing was {{ $value | humanizeDuration }} ago — it should run daily. The orchestrator or its scheduler may be down."

      - alert: GoogleTokenRefreshStale
        # scripts/refresh_google_token.py runs weekly via cron on the always-on
        # host and writes this timestamp. >8 days stale = the cron or the refresh
        # itself is failing; Calendar/Gmail will silently break once the token
        # lapses. (No `> 0` guard needed — the series only exists once the cron
        # has succeeded at least once.)
        expr: time() - jess_google_token_refresh_success_timestamp_seconds > 691200
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Google OAuth token refresh is stale (>8 days)"
          description: "The weekly token refresh hasn't succeeded in {{ $value | humanizeDuration }}. Check the cron + scripts/refresh_google_token.py before the token lapses."

  # ===========================================================================
  # UPS / Power Chain
  # ===========================================================================
  # Both UPSes feed Helios via NUT + nut_exporter on port 9199.
  # CyberPower CP1500PFCLCD = 1000W; Goldenmate 2000VA LiFePO4 (firmware-limited).
  - name: brain_gateway_ups
    interval: 30s
    rules:
      - alert: UPSOnBattery
        # ups_status flag goes 1 the instant grid power is lost. Sustained
        # `for: 30s` lets brief AC blips (transfer test, brownout flicker)
        # not page; anything beyond that is a real outage.
        expr: network_ups_tools_ups_status{flag="OB"} == 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "UPS '{{ $labels.ups }}' on battery"
          description: "Grid lost on {{ $labels.ups }} — running on battery. Check input voltage panel."

      - alert: UPSLowBattery
        # LB flag means the UPS itself thinks it's about to die. Below 20% is the
        # secondary trigger. Either way we want a critical-severity page.
        expr: network_ups_tools_ups_status{flag="LB"} == 1 or network_ups_tools_battery_charge < 20
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "UPS '{{ $labels.ups }}' low battery ({{ $value }}%)"
          description: "Battery at {{ $value }}% — graceful shutdown imminent."

      - alert: UPSReplaceBattery
        expr: network_ups_tools_ups_status{flag="RB"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "UPS '{{ $labels.ups }}' wants battery replaced"
          description: "Self-test reported the battery should be replaced. Doesn't affect runtime today; plan a swap."

      - alert: UPSOverload
        # OVER flag, OR ups.load > 90% sustained.
        expr: network_ups_tools_ups_status{flag="OVER"} == 1 or network_ups_tools_ups_load > 90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "UPS '{{ $labels.ups }}' overloaded ({{ $value }}%)"
          description: "Load >90% of rated capacity. Will cut runtime sharply on grid loss."

      - alert: UPSExporterDown
        # The scrape itself failing — covers nut_exporter container down OR
        # NUT server (upsd) down OR the UPS USB cable yanked.
        expr: up{job="nut"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NUT exporter scrape failing for '{{ $labels.ups }}'"
          description: "Prometheus can't reach the nut_exporter for {{ $labels.ups }}. UPS itself may be fine — check Helios:9199 + upsd."

      - alert: UPSInputVoltageOutOfRange
        # CyberPower only — Goldenmate doesn't expose input.voltage.
        # Wide tolerance — 105V/130V is well past what HVAC/legitimate
        # brownouts cause. AVR (BOOST/TRIM flags) covers normal swings.
        expr: network_ups_tools_input_voltage{ups="cyberpower"} < 105 or network_ups_tools_input_voltage{ups="cyberpower"} > 130
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Wall voltage abnormal: {{ $value }}V on {{ $labels.ups }}"
          description: "Sustained out-of-range input voltage. Brownout, surge, or wiring issue."
