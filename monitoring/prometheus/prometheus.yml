# Prometheus Configuration for Brain Gateway Cluster
#
# Node IPs:
#   Voyager:  10.0.0.186 (gateway, no GPU)
#   Helios:   10.0.0.195 (RTX 5090)
#   Uranus:   10.0.0.173 (2x RTX 5080)
#   Saturn:   10.0.0.58  (RTX 3080 + RTX 3090)
#   Jupiter:  10.0.0.248 (no GPU)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ============================================
  # PROMETHEUS SELF-MONITORING
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          node: 'voyager'

  # ============================================
  # NODE EXPORTERS - System Metrics
  # ============================================
  - job_name: 'node-exporter'
    static_configs:
      # Voyager (Docker host, no GPU)
      - targets: ['node-exporter:9100']
        labels:
          node: 'voyager'
          role: 'gateway'

      # Helios (Large models, RTX 5090 32GB)
      - targets: ['10.0.0.195:9100']
        labels:
          node: 'helios'
          role: 'expert'
          gpu: 'rtx5090'

      # Uranus (Nemotron brain, 2x RTX 5080 16GB each)
      - targets: ['10.0.0.173:9100']
        labels:
          node: 'uranus'
          role: 'brain'
          gpu: '2x-rtx5080'

      # Saturn (Batch jobs, RTX 3080 + RTX 3090)
      - targets: ['10.0.0.58:9100']
        labels:
          node: 'saturn'
          role: 'batch'
          gpu: 'rtx3080+rtx3090'

      # Jupiter (No GPU currently)
      - targets: ['10.0.0.248:9100']
        labels:
          node: 'jupiter'
          role: 'compute'

  # ============================================
  # GPU EXPORTERS - NVIDIA Metrics
  # ============================================
  - job_name: 'gpu-exporter'
    static_configs:
      # Helios GPU (Expert model - RTX 5090)
      - targets: ['10.0.0.195:9400']
        labels:
          node: 'helios'
          gpu: 'rtx5090'

      # Uranus GPUs (Nemotron - 2x RTX 5080)
      - targets: ['10.0.0.173:9400']
        labels:
          node: 'uranus'
          gpu: '2x-rtx5080'

      # Saturn GPUs (RTX 3080 + RTX 3090)
      - targets: ['10.0.0.58:9400']
        labels:
          node: 'saturn'
          gpu: 'rtx3080+rtx3090'

  # ============================================
  # LLM SERVICE METRICS (vLLM exposes /metrics)
  # ============================================
  - job_name: 'llm-services'
    metrics_path: /metrics
    static_configs:
      # Nemotron on Uranus (vLLM exposes metrics)
      - targets: ['10.0.0.173:8001']
        labels:
          service: 'nemotron'
          node: 'uranus'

  # NOTE: Orchestrator, LiteLLM, and Helios LLM don't expose /metrics
  # Monitor them via logs in Loki instead
