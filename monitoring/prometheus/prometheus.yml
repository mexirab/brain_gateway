# Prometheus Configuration for Brain Gateway Cluster
# ==================================================
# GENERATED FILE — edit monitoring/prometheus/prometheus.yml.template and run
# scripts/generate-configs.sh. Manual hand-edits are OK in a pinch but will
# be overwritten on the next regeneration.
#
# Network Architecture (v7 unified + split deployment):
#
#   Jupiter: 10.0.0.248 (Pi-hole primary, monitoring stack — prometheus/grafana/loki,
#                         conjure API, netdata)
#   Helios:  10.0.0.195 (Brain gateway, primary LLM on RTX PRO 5000, TTS/STT on PRO 5000,
#                         code agent Qwen2.5-Coder-32B on RTX 5090, always-on)
#   Saturn:  10.0.0.58  (Vision model Qwen2.5-VL-7B on RTX 3080, Pi-hole secondary)
#   Uranus:  10.0.0.173 (ComfyUI/Conjure on 2x RTX 5080)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # ============================================
  # PROMETHEUS SELF-MONITORING
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          node: 'jupiter'

  # ============================================
  # NODE EXPORTERS - System Metrics
  # ============================================
  - job_name: 'node-exporter'
    static_configs:
      # Jupiter (Pi-hole primary + monitoring stack, no GPU)
      - targets: ['10.0.0.248:9100']
        labels:
          node: 'jupiter'
          role: 'monitoring+pihole'

      # Helios (Gateway + primary LLM + TTS/STT + coder)
      - targets: ['10.0.0.195:9100']
        labels:
          node: 'helios'
          role: 'gateway'
          gpu: 'rtx5090+rtx-pro-5000'

      # Uranus (ComfyUI / Conjure on 2x RTX 5080)
      - targets: ['10.0.0.173:9100']
        labels:
          node: 'uranus'
          role: 'comfyui'
          gpu: '2x-rtx5080'

      # Saturn (Vision model + Pi-hole secondary)
      - targets: ['10.0.0.58:9100']
        labels:
          node: 'saturn'
          role: 'vision+pihole-secondary'
          gpu: 'rtx3080+rtx3090'

  # ============================================
  # GPU EXPORTERS - NVIDIA Metrics
  # ============================================
  - job_name: 'gpu-exporter'
    static_configs:
      - targets: ['10.0.0.195:9400']
        labels:
          node: 'helios'
          gpu: 'rtx5090+rtx-pro-5000'

      - targets: ['10.0.0.173:9400']
        labels:
          node: 'uranus'
          gpu: '2x-rtx5080'

      - targets: ['10.0.0.58:9400']
        labels:
          node: 'saturn'
          gpu: 'rtx3080+rtx3090'

  # ============================================
  # CONJURE API METRICS
  # ============================================
  # Conjure runs as a bare PM2 process on Jupiter (port 5050).
  - job_name: 'conjure'
    scrape_interval: 15s
    static_configs:
      - targets: ['10.0.0.248:5050']
        labels:
          service: 'conjure-api'
          node: 'jupiter'

  # ============================================
  # HTTP HEALTH PROBES (Blackbox Exporter)
  # ============================================
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      # Brain Gateway Orchestrator (Helios)
      - targets: ['http://10.0.0.195:8888/health']
        labels:
          service: 'orchestrator'
          node: 'helios'

      # TTS (Qwen3-TTS on Helios GPU1)
      - targets: ['http://10.0.0.195:8002/health']
        labels:
          service: 'tts'
          node: 'helios'

      # STT (Whisper on Helios GPU1)
      - targets: ['http://10.0.0.195:8003/health']
        labels:
          service: 'stt'
          node: 'helios'

      # Primary LLM (llama-server on Helios GPU1)
      - targets: ['http://10.0.0.195:8080/v1/models']
        labels:
          service: 'llama-primary'
          node: 'helios'

      # Code agent (llama-server on Helios GPU0)
      - targets: ['http://10.0.0.195:8082/v1/models']
        labels:
          service: 'llama-coder'
          node: 'helios'

      # Vision model (Qwen2.5-VL-7B on Saturn)
      - targets: ['http://10.0.0.58:8010/v1/models']
        labels:
          service: 'vision'
          node: 'saturn'

      # Conjure API (PM2 on Jupiter)
      - targets: ['http://10.0.0.248:5050/health']
        labels:
          service: 'conjure'
          node: 'jupiter'

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ============================================
  # BRAIN GATEWAY ORCHESTRATOR METRICS
  # ============================================
  - job_name: 'orchestrator'
    metrics_path: /metrics
    scrape_interval: 15s
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/api_token
    static_configs:
      - targets: ['10.0.0.195:8888']
        labels:
          service: 'orchestrator'
          node: 'helios'

  # ============================================
  # NETDATA - Detailed System Metrics
  # ============================================
  - job_name: 'netdata'
    metrics_path: /api/v1/allmetrics
    params:
      format: [prometheus]
    honor_labels: true
    scrape_interval: 30s
    static_configs:
      - targets: ['10.0.0.248:19999']
        labels:
          node: 'jupiter'
          source: 'netdata'
      - targets: ['10.0.0.58:19999']
        labels:
          node: 'saturn'
          source: 'netdata'
      - targets: ['10.0.0.173:19999']
        labels:
          node: 'uranus'
          source: 'netdata'
      - targets: ['10.0.0.195:19999']
        labels:
          node: 'helios'
          source: 'netdata'
