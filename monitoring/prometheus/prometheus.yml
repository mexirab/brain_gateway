# Prometheus Configuration for Brain Gateway Cluster
# ==================================================
# TEMPLATE FILE - Do not edit directly!
#
# This file uses environment variable placeholders that are
# substituted by scripts/generate-configs.sh using envsubst.
#
# After editing this template, run:
#   ./scripts/generate-configs.sh
#
# Network Architecture (Voice-First ADHD Support):
#
# ALWAYS-ON:
#   Jupiter:  10.0.0.248 (Orchestrator, no GPU)
#   Saturn:   10.0.0.58  (Nemotron-8B brain on RTX 3090)
#   Uranus:   10.0.0.173  (TTS on GPU 0, STT on GPU 1 - 2x RTX 5080)
#
# OFF BY DEFAULT (saves ~150W):
#   Helios:   10.0.0.195  (Qwen3-32B on RTX 5090)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # ============================================
  # PROMETHEUS SELF-MONITORING
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          node: 'jupiter'

  # ============================================
  # NODE EXPORTERS - System Metrics
  # ============================================
  - job_name: 'node-exporter'
    static_configs:
      # Jupiter (Docker host, gateway, no GPU)
      - targets: ['10.0.0.248:9100']
        labels:
          node: 'jupiter'
          role: 'gateway'

      # Helios (Large models, RTX 5090 32GB)
      - targets: ['10.0.0.195:9100']
        labels:
          node: 'helios'
          role: 'expert'
          gpu: 'rtx5090'

      # Uranus (2x RTX 5080 16GB each - TTS + STT)
      - targets: ['10.0.0.173:9100']
        labels:
          node: 'uranus'
          role: 'tts-stt'
          gpu: '2x-rtx5080'

      # Saturn (Nemotron brain on RTX 3090, RTX 3080 available)
      - targets: ['10.0.0.58:9100']
        labels:
          node: 'saturn'
          role: 'brain'
          gpu: 'rtx3080+rtx3090'

  # ============================================
  # GPU EXPORTERS - NVIDIA Metrics
  # ============================================
  - job_name: 'gpu-exporter'
    static_configs:
      # Helios GPU (Expert model - RTX 5090)
      - targets: ['10.0.0.195:9400']
        labels:
          node: 'helios'
          gpu: 'rtx5090'

      # Uranus GPUs (Nemotron - 2x RTX 5080)
      - targets: ['10.0.0.173:9400']
        labels:
          node: 'uranus'
          gpu: '2x-rtx5080'

      # Saturn GPUs (RTX 3080 + RTX 3090)
      - targets: ['10.0.0.58:9400']
        labels:
          node: 'saturn'
          gpu: 'rtx3080+rtx3090'

  # ============================================
  # LLM SERVICE METRICS (vLLM exposes /metrics)
  # ============================================
  - job_name: 'llm-services'
    metrics_path: /metrics
    static_configs:
      # Nemotron on Saturn (vLLM exposes metrics)
      - targets: ['10.0.0.58:8001']
        labels:
          service: 'nemotron'
          node: 'saturn'

  # ============================================
  # CONJURE API METRICS
  # ============================================
  # Conjure runs as a bare PM2 process on Jupiter (port 5050).
  # The /metrics endpoint exposes prom-client counters/histograms
  # for HTTP requests, visualization pipeline, and rate limiting.
  - job_name: 'conjure'
    scrape_interval: 15s
    static_configs:
      - targets: ['10.0.0.248:5050']
        labels:
          service: 'conjure-api'
          node: 'jupiter'

  # ============================================
  # HTTP HEALTH PROBES (Blackbox Exporter)
  # ============================================
  # Requires blackbox exporter running in monitoring stack
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      # Brain Gateway Orchestrator
      - targets: ['http://10.0.0.248:8888/health']
        labels:
          service: 'orchestrator'
          node: 'jupiter'

      # TTS (Qwen3-TTS on Uranus GPU 0)
      - targets: ['http://10.0.0.173:8002/health']
        labels:
          service: 'tts'
          node: 'uranus'

      # STT (Whisper on Uranus GPU 1)
      - targets: ['http://10.0.0.173:8003/health']
        labels:
          service: 'stt'
          node: 'uranus'

      # Helios Expert Model (OFF by default)
      - targets: ['http://10.0.0.195:8080/health']
        labels:
          service: 'helios'
          node: 'helios'

      # Conjure API (PM2 on Jupiter)
      - targets: ['http://10.0.0.248:5050/health']
        labels:
          service: 'conjure'
          node: 'jupiter'

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115  # Blackbox exporter address

  # ============================================
  # BRAIN GATEWAY ORCHESTRATOR METRICS
  # ============================================
  - job_name: 'orchestrator'
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['10.0.0.248:8888']
        labels:
          service: 'orchestrator'
          node: 'jupiter'

  # ============================================
  # NETDATA - Detailed System Metrics
  # ============================================
  - job_name: 'netdata'
    metrics_path: /api/v1/allmetrics
    params:
      format: [prometheus]
    honor_labels: true
    scrape_interval: 30s
    static_configs:
      - targets: ['10.0.0.248:19999']
        labels:
          node: 'jupiter'
          source: 'netdata'
      - targets: ['10.0.0.58:19999']
        labels:
          node: 'saturn'
          source: 'netdata'
      - targets: ['10.0.0.173:19999']
        labels:
          node: 'uranus'
          source: 'netdata'
      - targets: ['10.0.0.195:19999']
        labels:
          node: 'helios'
          source: 'netdata'
