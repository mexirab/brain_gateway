# Prometheus Configuration for Brain Gateway Cluster
#
# Optimized Architecture (Voice-First ADHD Support):
#
# ALWAYS-ON:
#   Voyager:  10.0.0.186 (Orchestrator, no GPU)
#   Saturn:   10.0.0.58  (Nemotron-8B brain on RTX 3090)
#   Uranus:   10.0.0.173 (TTS on GPU 0, STT on GPU 1 - 2x RTX 5080)
#
# OFF BY DEFAULT (saves ~150W):
#   Helios:   10.0.0.195 (Expert 120B on RTX 5090 + RAM)
#
# FUTURE USE:
#   Jupiter:  10.0.0.248 (AMD GPUs - potential image gen)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ============================================
  # PROMETHEUS SELF-MONITORING
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          node: 'voyager'

  # ============================================
  # NODE EXPORTERS - System Metrics
  # ============================================
  - job_name: 'node-exporter'
    static_configs:
      # Voyager (Docker host, no GPU)
      - targets: ['node-exporter:9100']
        labels:
          node: 'voyager'
          role: 'gateway'

      # Helios (Large models, RTX 5090 32GB)
      - targets: ['10.0.0.195:9100']
        labels:
          node: 'helios'
          role: 'expert'
          gpu: 'rtx5090'

      # Uranus (2x RTX 5080 16GB each - available)
      - targets: ['10.0.0.173:9100']
        labels:
          node: 'uranus'
          role: 'available'
          gpu: '2x-rtx5080'

      # Saturn (Nemotron brain on RTX 3090, RTX 3080 available)
      - targets: ['10.0.0.58:9100']
        labels:
          node: 'saturn'
          role: 'brain'
          gpu: 'rtx3080+rtx3090'

      # Jupiter (No GPU currently)
      - targets: ['10.0.0.248:9100']
        labels:
          node: 'jupiter'
          role: 'compute'

  # ============================================
  # GPU EXPORTERS - NVIDIA Metrics
  # ============================================
  - job_name: 'gpu-exporter'
    static_configs:
      # Helios GPU (Expert model - RTX 5090)
      - targets: ['10.0.0.195:9400']
        labels:
          node: 'helios'
          gpu: 'rtx5090'

      # Uranus GPUs (Nemotron - 2x RTX 5080)
      - targets: ['10.0.0.173:9400']
        labels:
          node: 'uranus'
          gpu: '2x-rtx5080'

      # Saturn GPUs (RTX 3080 + RTX 3090)
      - targets: ['10.0.0.58:9400']
        labels:
          node: 'saturn'
          gpu: 'rtx3080+rtx3090'

  # ============================================
  # LLM SERVICE METRICS (vLLM exposes /metrics)
  # ============================================
  - job_name: 'llm-services'
    metrics_path: /metrics
    static_configs:
      # Nemotron on Saturn (vLLM exposes metrics)
      - targets: ['10.0.0.58:8001']
        labels:
          service: 'nemotron'
          node: 'saturn'

  # ============================================
  # HTTP HEALTH PROBES (Blackbox Exporter)
  # ============================================
  # Requires blackbox exporter running in monitoring stack
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      # Brain Gateway Orchestrator
      - targets: ['http://10.0.0.186:8888/health']
        labels:
          service: 'orchestrator'
          node: 'voyager'

      # TTS (Qwen3-TTS on Uranus GPU 0)
      - targets: ['http://10.0.0.173:8002/health']
        labels:
          service: 'tts'
          node: 'uranus'

      # STT (Whisper on Uranus GPU 1)
      - targets: ['http://10.0.0.173:8003/health']
        labels:
          service: 'stt'
          node: 'uranus'

      # Helios Expert Model (OFF by default)
      - targets: ['http://10.0.0.195:8080/health']
        labels:
          service: 'helios'
          node: 'helios'

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115  # Blackbox exporter address

  # NOTE: Orchestrator, LiteLLM, and Helios LLM don't expose /metrics
  # Monitor them via logs in Loki instead
