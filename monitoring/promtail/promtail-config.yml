# Promtail Configuration for Brain Gateway
# Ships Docker container logs to Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ============================================
  # DOCKER CONTAINER LOGS
  # ============================================
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only relevant containers (brain-* and monitoring containers)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(brain-.*|open-webui.*|redis.*|grafana|prometheus|loki|promtail|node-exporter)'
        action: keep

      # Extract container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Extract compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'

      # Extract compose service
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

    pipeline_stages:
      # Step 1: Parse JSON logs from structured logging
      - json:
          expressions:
            level: level
            message: msg
            timestamp: ts
            request_id: request_id
            component: component
            tool_name: tool_name
            mode: mode
            intensity: intensity
            model: model
            entity_id: entity_id
            error_type: error_type
            latency_ms: latency_ms
            result_count: result_count

      # Step 2: Apply labels from JSON fields
      - labels:
          level:
          component:
          tool_name:
          mode:
          intensity:
          model:
          entity_id:
          error_type:

      # Step 3: Fallback regex for non-JSON logs (other containers)
      - regex:
          expression: '(?P<tool_type>home_assistant|search_memory|ask_expert|ask_orchestrator|set_reminder|cancel_reminder|update_data|web_search|check_calendar|create_calendar_event|start_focus|stop_focus|focus_status)'
          source: output

      - labels:
          tool_type:

      # Step 4: Extract entity IDs from HA calls (fallback for non-JSON)
      - regex:
          expression: 'entity_id["\s:]+(?P<entity_id>[a-z_]+\.[a-z0-9_]+)'
          source: output

      - labels:
          entity_id:

      # Step 5: Level detection for non-JSON logs
      - regex:
          expression: '(?i)(?P<level>error|warn|info|debug)'
          source: output

      - labels:
          level:

  # ============================================
  # CONJURE PM2 LOGS (file-based, not Docker)
  # ============================================
  # Conjure runs as a bare Node.js process managed by PM2,
  # not in Docker. PM2 writes pino structured JSON logs to
  # /opt/conjure/server/logs/. This job reads those files
  # and ships them to Loki with parsed labels for filtering.
  - job_name: conjure
    static_configs:
      - targets:
          - localhost
        labels:
          job: conjure
          service: conjure-api
          __path__: /opt/conjure/server/logs/*.log
    pipeline_stages:
      # Each line is a pino JSON object in production
      - json:
          expressions:
            level: level
            component: component
            event: event
      # Map pino numeric levels to human-readable labels.
      # pino uses: 10=trace, 20=debug, 30=info, 40=warn, 50=error, 60=fatal
      - template:
          source: level
          template: '{{ if eq .Value "10" }}trace{{ else if eq .Value "20" }}debug{{ else if eq .Value "30" }}info{{ else if eq .Value "40" }}warn{{ else if eq .Value "50" }}error{{ else if eq .Value "60" }}fatal{{ else }}{{ .Value }}{{ end }}'
      - labels:
          level:
          component:
          event:
