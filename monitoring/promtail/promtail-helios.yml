# Promtail Configuration — Helios node
# Ships Docker container logs from Helios to Loki on Jupiter.
# The monitoring stack (Loki/Grafana/Prometheus) runs on Jupiter; the existing
# promtail-config.yml is Jupiter-local and only sees Jupiter's Docker socket.
# This config is mounted into a promtail container that runs on Helios, so it
# sees Helios's containers (brain-orchestrator, open-webui, redis, etc.) and
# pushes them across the LAN to Jupiter's Loki.
#
# Run with: -config.expand-env=true   (so ${LOKI_PUSH_URL} is interpolated)

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

# LAN-plaintext over Tailscale by default — Tailscale establishes a direct
# WireGuard tunnel between Helios and Jupiter on the same subnet, so the push
# traffic is authenticated and encrypted without cert management. Override
# with a bare http:// URL via LOKI_PUSH_URL in .env if the tailnet is down.
clients:
  - url: ${LOKI_PUSH_URL:-http://jupiter-amds.tail74fc4a.ts.net:3100/loki/api/v1/push}

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only Brain Gateway containers — skip noisy or irrelevant ones
      - source_labels: ['__meta_docker_container_name']
        regex: '/(brain-.*|open-webui.*|redis.*|searxng|wyoming-.*|nebula-sync|nut-exporter)'
        action: keep

      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Static label so dashboards can distinguish Helios vs Jupiter logs
      - target_label: 'host'
        replacement: 'helios'

    pipeline_stages:
      # Parse JSON logs from orchestrator's structured logging
      - json:
          expressions:
            level: level
            message: msg
            timestamp: ts
            request_id: request_id
            component: component
            tool_name: tool_name
            mode: mode
            intensity: intensity
            model: model
            entity_id: entity_id
            error_type: error_type
            latency_ms: latency_ms
            result_count: result_count

      # Only promote low-cardinality, bounded fields to stream labels.
      # entity_id and request_id are intentionally NOT labels — entity_id can
      # be any HA entity (hundreds) and request_id is unique per call, both
      # would explode Loki's stream index. They remain available via
      # `| json entity_id request_id` as line-level filters in LogQL.
      - labels:
          level:
          component:
          tool_name:
          mode:
          intensity:
          model:
          error_type:

      # Fallback level detection for non-JSON containers.
      # `source:` is omitted intentionally — promtail's regex stage defaults
      # to matching the raw log line, which is what we want for containers
      # whose output isn't JSON (redis, wyoming, nginx, etc.).
      - regex:
          expression: '(?i)(?P<level_fallback>error|warn|info|debug)'

      - labels:
          level_fallback:

  # ---------------------------------------------------------------------------
  # systemd journal scrape — feeds F-014 self-audit
  # ---------------------------------------------------------------------------
  # Adds visibility into host-level systemd units that aren't Docker (the
  # llama-server family, qwen-tts, brain-gateway, etc.) so the daily audit
  # job in orchestrator/jobs_self_audit.py can spot crashes / restart loops
  # in the LLM and TTS services. Limited via `matches:` to a known-safe
  # whitelist of units — we do NOT scrape the whole system journal (that
  # would balloon Loki cardinality and ingest random user/session logs).
  - job_name: journal
    journal:
      max_age: 24h
      path: /var/log/journal
      labels:
        job: systemd-journal
        host: helios
      # Only emit lines whose unit matches one of these. Add new ones here
      # if a new always-on systemd service ships and the audit job should
      # see its errors.
      # Same-field OR uses space-separated terms (journalctl convention).
      # The '+' separator is for OR between DIFFERENT field-name groups; we
      # only filter on _SYSTEMD_UNIT, so same-field OR via space is correct.
      matches: '_SYSTEMD_UNIT=llama-server.service _SYSTEMD_UNIT=llama-server-coder.service _SYSTEMD_UNIT=qwen-tts.service _SYSTEMD_UNIT=parakeet-stt.service _SYSTEMD_UNIT=vllm-primary.service _SYSTEMD_UNIT=brain-gateway.service _SYSTEMD_UNIT=nut-server.service _SYSTEMD_UNIT=nut-monitor.service _SYSTEMD_UNIT=nut-driver-enumerator.service _SYSTEMD_UNIT=nut-driver@cyberpower.service _SYSTEMD_UNIT=nut-driver@goldenmate.service'
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
      # Map systemd priority numbers to a `level` label that matches the
      # docker scrape's level taxonomy (so the audit query can union both
      # streams with one regex).
      - source_labels: ['__journal_priority_keyword']
        target_label: 'level'
        regex: '(emerg|alert|crit)'
        replacement: 'critical'
      - source_labels: ['__journal_priority_keyword']
        target_label: 'level'
        regex: 'err'
        replacement: 'error'
      - source_labels: ['__journal_priority_keyword']
        target_label: 'level'
        regex: 'warning'
        replacement: 'warn'
      - source_labels: ['__journal__hostname']
        target_label: 'hostname'

    pipeline_stages:
      # Drop qwen-tts health-check heartbeat at the agent — it's a
      # ~5700 lines/day "GET /health 200 OK" stream from Jupiter, zero
      # diagnostic value, doubles Loki ingest if left in. Other units
      # are quiet enough to leave un-filtered.
      - match:
          selector: '{unit="qwen-tts.service"}'
          stages:
            - drop:
                expression: '"GET /health HTTP/1.1" 200'
                drop_counter_reason: tts_health_heartbeat
