# NOTE: This config is NOT currently wired into docker-compose.yml.
# It's a reference config for future public / HTTPS ingress on Helios.
# To activate: issue a Tailscale cert with `sudo tailscale cert helios.tail74fc4a.ts.net`,
# place it in certs/helios.crt + certs/helios.key, and add an nginx service to docker-compose.
server {
    listen 443 ssl;
    server_name helios.tail74fc4a.ts.net;

    ssl_certificate     /etc/nginx/certs/helios.crt;
    ssl_certificate_key /etc/nginx/certs/helios.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    location / {
        proxy_pass http://open-webui:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support (Open WebUI uses it)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Streaming support
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
