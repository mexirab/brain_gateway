[tool.ruff]
target-version = "py311"
line-length = 120
src = ["orchestrator"]
# Only lint orchestrator/. The astral-sh/ruff-action@v3 appends the workspace
# path to its positional args, which would otherwise make ruff also scan legacy
# standalone scripts under ha_automations/, rag/, tts/, scripts/ (reindex_rag,
# etc.), pi-kiosk/, and tools/ that were never meant to conform to the strict
# orchestrator rule set. Keep this exclude list narrow and project-rooted.
extend-exclude = [
    "ha_automations",
    "rag",
    "tts",
    "pi-kiosk",
    "models",
    "monitoring",
    "frontend",
    "data",
    "credentials",
    "certs",
    "scripts/reindex_rag.py",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # bugbear
    "SIM",  # simplify
]
ignore = [
    "E501",   # line too long (handled by formatter, not strict for now)
    "E402",   # module-import-not-at-top (common in scripts with path setup)
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends pattern)
    "SIM108", # use ternary operator (readability preference)
    "UP006",  # non-pep585-annotation (List[] -> list[] — cosmetic, fix later)
    "UP035",  # deprecated-import (typing.List etc — cosmetic, fix later)
    "UP045",  # non-pep604-annotation (Optional[X] -> X | None — cosmetic, fix later)
]

[tool.ruff.lint.isort]
known-first-party = ["orchestrator"]

[tool.ruff.lint.per-file-ignores]
"orchestrator/tests/**" = ["E", "F841"]       # relaxed for tests
"orchestrator/background_jobs.py" = ["E741"]  # single-letter var in list comp

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
