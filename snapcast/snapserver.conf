[server]
datadir = /config/

[http]
enabled = true
doc_root = /usr/share/snapserver/snapweb
port = 1780

[tcp-control]
enabled = true
bind_to_address = 0.0.0.0
port = 1705

[stream]
sampleformat = 48000:16:1
codec = flac
chunk_ms = 20
buffer = 1000

# Per-room TTS pipes (mono 48kHz int16 — resampled from 24kHz TTS output)
source = pipe:///tmp/snapcast/office?name=Office&sampleformat=48000:16:1&mode=create
source = pipe:///tmp/snapcast/bedroom?name=Bedroom&sampleformat=48000:16:1&mode=create
source = pipe:///tmp/snapcast/living?name=Living&sampleformat=48000:16:1&mode=create
source = pipe:///tmp/snapcast/kitchen?name=Kitchen&sampleformat=48000:16:1&mode=create
source = pipe:///tmp/snapcast/all?name=All&sampleformat=48000:16:1&mode=create
