[server]
datadir = /config/

[http]
enabled = true
doc_root = /usr/share/snapserver/snapweb
port = 1780

[tcp-control]
enabled = true
bind_to_address = 0.0.0.0
port = 1705

[stream]
sampleformat = 24000:16:1
codec = flac
chunk_ms = 20

# Per-room TTS pipes (mono 24kHz int16 — matches Qwen3-TTS output)
source = pipe:///tmp/snapfifo_office?name=Office&sampleformat=24000:16:1
source = pipe:///tmp/snapfifo_bedroom?name=Bedroom&sampleformat=24000:16:1
source = pipe:///tmp/snapfifo_living?name=Living&sampleformat=24000:16:1
source = pipe:///tmp/snapfifo_kitchen?name=Kitchen&sampleformat=24000:16:1
source = pipe:///tmp/snapfifo_all?name=All&sampleformat=24000:16:1
