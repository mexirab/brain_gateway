# Brain Gateway User Profile
# ===========================
# Copy this file to user_profile.yaml and customize for your setup.
# All values have sensible defaults — only set what you need to change.
#
# Priority: environment variables > this file > built-in defaults

user:
  name: "Your Name"
  home_address: ""                      # For travel-time calendar alerts
  timezone: "America/Chicago"

assistant:
  name: "Jess"                          # Your AI assistant's name
  voice: "jessica"                      # TTS voice name
  personality: "warm, friendly, supportive ADHD coach"

speakers:
  default: "media_player.office_max"               # Reminders, announcements
  morning_briefing: "media_player.bedroom_pair"   # Morning briefing speaker
  focus_audio: "media_player.office_max"           # Focus session audio
  aliases:                                         # Friendly name → entity_id
    office: "media_player.office_max"
    bedroom: "media_player.bedroom_pair"
    kitchen: "media_player.kitchen_display"
    # living room: "media_player.living_room_speakers"

notifications:
  mobile_service: ""                    # e.g., "notify.mobile_app_your_iphone"
  title: "Reminder"                     # Push notification title

sensors:
  temperature:
    closet: "sensor.closet_temperature"
    ambient: "sensor.kitchen_temperature"
    warning: 80                          # Warning threshold (°F)
    critical: 85                         # Critical threshold (°F)

coaching:
  default_mode: "explainer"              # explainer | mirror | counterbalance | challenge | baseline
  grounding_preference: "only_when_high" # only_when_high | always | never

finance:
  monthly_discretionary: 1000
  retirement_target_age: 62
  current_age: 30

# LLM Backend Configuration (optional)
# =====================================
# Omit this section entirely to use env vars (MODEL_URL, FALLBACK_MODEL_URL, etc.)
# Backends: "openai_compatible" (vLLM, llama.cpp, Ollama), "anthropic" (Claude), "openai" (GPT)
# API keys support ${ENV_VAR} syntax to reference environment variables.
#
# llm:
#   model:                                   # Primary model (conversation + tools)
#     backend: "openai_compatible"
#     url: "http://10.0.0.195:8080/v1"
#     model: "Qwen3.5-27B"
#   fallback:                                # Fallback model (used when primary is down)
#     backend: "openai_compatible"
#     url: "http://10.0.0.58:8001/v1"
#     model: "Qwen3.5-9B"
#
# --- BYOK Examples ---
#
# Claude as primary model:
# llm:
#   model:
#     backend: "anthropic"
#     url: "https://api.anthropic.com/v1"
#     model: "claude-sonnet-4-20250514"
#     api_key: "${ANTHROPIC_API_KEY}"
#   fallback:
#     backend: "openai"
#     url: "https://api.openai.com/v1"
#     model: "gpt-4o-mini"
#     api_key: "${OPENAI_API_KEY}"
#
# Fully local with Ollama:
# llm:
#   model:
#     backend: "openai_compatible"
#     url: "http://localhost:11434/v1"
#     model: "llama3.1:8b"
#   orchestrator:
#     backend: "openai_compatible"
#     url: "http://localhost:11434/v1"
#     model: "llama3.1:8b"

# TTS Backend Configuration (optional)
# =====================================
# Omit this section entirely to use env vars (TTS_URL, TTS_VOICE)
# Backends: "local_http" (Qwen3-TTS, etc.), "elevenlabs", "piper", "openai"
# API keys support ${ENV_VAR} syntax to reference environment variables.
#
# tts:
#   backend: "local_http"
#   url: "http://10.0.0.195:8002"
#   voice: "jessica"
#
# --- Cloud TTS Examples ---
#
# ElevenLabs:
# tts:
#   backend: "elevenlabs"
#   voice: "Rachel"                    # ElevenLabs voice name or ID
#   api_key: "${ELEVENLABS_API_KEY}"
#
# OpenAI TTS:
# tts:
#   backend: "openai"
#   voice: "nova"                      # alloy, echo, fable, onyx, nova, shimmer
#   api_key: "${OPENAI_API_KEY}"
#   model: "tts-1"                     # tts-1 or tts-1-hd
#
# Piper (free, local CPU — no GPU required):
# tts:
#   backend: "piper"
#   url: "http://localhost:10200"
#   voice: "en_US-lessac-medium"
